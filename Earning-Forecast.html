    // Data cache
    let studentsCache = [];

    let unpaidByStudent = new Map(); // studentId -> amount owed

    let absencesCache = [];
    let skippedClassesCache = [];
    let creditPaymentsCache = [];
    let manualEnrollmentsCache = [];

    // ── Payment/absence index structures ─────────────────────────────────────
    const paymentIndex = new Map();
    const absenceIndex = new Set();
    const skippedIndex = new Set();
    const manualEnrollmentSet = new Set();

    // ── Ignored debts (persisted in localStorage) ─────────────────────────────
    const FC_IGNORED_KEY = 'arnoma-forecast-ignored-debts';
    let ignoredDebtStudents = new Set(JSON.parse(localStorage.getItem(FC_IGNORED_KEY) || '[]').map(String));

    // ── Unpaid filter toggle ───────────────────────────────────────────────────
    let showOnlyUnpaid = false;
    function toggleUnpaidFilter() {
      showOnlyUnpaid = !showOnlyUnpaid;
      const btn = document.getElementById('unpaidFilterBtn');

        btn.style.background = showOnlyUnpaid ? 'rgba(239,68,68,0.35)' : 'rgba(239,68,68,0.15)';

        btn.textContent = showOnlyUnpaid ? '✕ Show All' : '⚠️ Unpaid';
      }
      updateStudentBreakdown();
    }

    function updateTotalDebtPill() {
      const pill = document.getElementById('totalDebtPill');
      if (!pill) return;
      let total = 0;
      unpaidByStudent.forEach((amt, sid) => {

    function saveIgnoredDebts() {
      localStorage.setItem(FC_IGNORED_KEY, JSON.stringify([...ignoredDebtStudents]));
    }

    function ignoreStudentDebt(studentId) {
      ignoredDebtStudents.add(String(studentId));
      saveIgnoredDebts();
      updateStudentBreakdown();
    }

    // Currency formatter
    function formatCurrency(value, symbol = '$') {
      const formatted = Math.round(value).toLocaleString('en-US');
      return `${formatted} ${symbol}`;
    }

    // HTML escape
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // ── Timezone / date helpers (mirrored from Calendar-NEW.html) ─────────────
    const FC_LA_TIMEZONE = 'America/Los_Angeles';
    const fcLaFormatter = new Intl.DateTimeFormat('en-US', {
      timeZone: FC_LA_TIMEZONE, year: 'numeric', month: 'numeric', day: 'numeric'
    });

    function fcGetToday() {
      const parts = fcLaFormatter.formatToParts(new Date());
      const y = Number(parts.find(p => p.type === 'year')?.value);
      const m = Number(parts.find(p => p.type === 'month')?.value);
      const d = Number(parts.find(p => p.type === 'day')?.value);
      return new Date(y, m - 1, d);
    }

    function fcGetWeekday(dateStr) {
      const d = new Date(`${fcNormDate(dateStr)}T12:00:00Z`);
      return new Intl.DateTimeFormat('en-US', { timeZone: FC_LA_TIMEZONE, weekday: 'long' }).format(d);
    }

    function fcNormDate(value) {
      if (!value) return '';
      if (value instanceof Date) return value.toISOString().split('T')[0];
      const raw = String(value).trim();
      const datePart = raw.split('T')[0];
      const sep = datePart.includes('/') ? '/' : '-';
      const parts = datePart.split(sep).map(p => p.trim());
      if (parts.length !== 3) return datePart;
      if (parts[0].length === 4) return `${parts[0]}-${parts[1].padStart(2,'0')}-${parts[2].padStart(2,'0')}`;
      if (parts[2].length === 4) return `${parts[2]}-${parts[0].padStart(2,'0')}-${parts[1].padStart(2,'0')}`;
      return datePart;
    }

    function fcNormName(v) {
      return String(v || '').toLowerCase().replace(/[.,'"()]/g, ' ').replace(/\s+/g, ' ').trim();
    }

    function fcExtractForClassDates(record, fallbackDate) {
      if (!record) return [];
      let raw = record.for_class_dates ?? record.for_class ?? [];
      if (typeof raw === 'string') {
        const t = raw.trim();
        if (!t || t === '[]' || t === '{}' || t === 'null') raw = [];
        else if (t.startsWith('{') && t.endsWith('}')) raw = t.slice(1,-1).split(',').map(d => d.trim()).filter(d => d && d !== 'null');
        else { try { raw = JSON.parse(t); } catch(e) { raw = []; } }
      }
      if (!Array.isArray(raw) || raw.length === 0) {
        const fb = fcNormDate(fallbackDate || record.date || record.email_date);
        return fb ? [fb] : [];
      }
      return raw.map(entry => {
        const s = (typeof entry === 'object' && entry !== null)
          ? (entry.class_date || entry.date || entry.for_class || entry.value || '')
          : String(entry || '');
        return fcNormDate(s);
      }).filter(Boolean);
    }

    function fcParseSchedule(scheduleStr) {
      if (!scheduleStr) return [];
      const dayMap = {sun:'Sunday',sunday:'Sunday',mon:'Monday',monday:'Monday',tue:'Tuesday',tues:'Tuesday',tuesday:'Tuesday',wed:'Wednesday',weds:'Wednesday',wednesday:'Wednesday',thu:'Thursday',thur:'Thursday',thurs:'Thursday',thursday:'Thursday',fri:'Friday',friday:'Friday',sat:'Saturday',saturday:'Saturday'};
      const sessions = [];
      scheduleStr.split(',').map(p => p.trim()).filter(Boolean).forEach(part => {
        const m = part.match(/^([A-Za-z/]+)\s+(.+)$/);
        if (!m) return;
        m[1].split('/').forEach(day => {
          const fd = dayMap[day.trim().toLowerCase().replace(/[^a-z]/g, '')] || '';
          if (fd) sessions.push({ day: fd, time: m[2] });
        });
      });
      return sessions;
    }

    function fcIsScheduledDate(dateStr, group) {
      if (!group?.schedule) return false;
      const dayName = fcGetWeekday(dateStr);
      return fcParseSchedule(group.schedule).some(s => s.day === dayName);
    }

    // Normalize group code: "Group A" → "A", "a" → "A"
    function fcNormGroupCode(val) {
      if (!val) return '';
      return String(val).trim().replace(/^group\s+/i, '').replace(/[^a-z0-9]/gi, '').toUpperCase();
    }

    function fcBuildIndexes() {
      // Name → Set<studentId> lookup
      const nameToIds = new Map();
      studentsCache.forEach(student => {
        const addName = nm => {
          const n = fcNormName(nm);
          if (!n) return;
          if (!nameToIds.has(n)) nameToIds.set(n, new Set());
          nameToIds.get(n).add(String(student.id));
        };
        addName(student.name);
        let aliases = [];
        if (Array.isArray(student.aliases)) aliases = student.aliases;
        else if (typeof student.aliases === 'string' && student.aliases.trim()) {
          try { const p = JSON.parse(student.aliases); if (Array.isArray(p)) aliases = p; } catch(e) { aliases = student.aliases.split(',').map(a => a.trim()).filter(Boolean); }
        }
        aliases.forEach(addName);
      });

      // Build paymentIndex from ALL payments
      paymentIndex.clear();
      const addToIndex = (dateStr, ids) => {
        const nd = fcNormDate(dateStr);
        if (!nd) return;
        if (!paymentIndex.has(nd)) paymentIndex.set(nd, new Set());
        const set = paymentIndex.get(nd);
        ids.forEach(id => id && set.add(String(id)));
      };

      allPaymentsCache.forEach(p => {
        // Use null as fallback — payments table has email_date not date;
        // using email_date as fallback incorrectly marks email receipt dates as paid class dates.
        const dates = fcExtractForClassDates(p, null);
        dates.forEach(d => {
          const sid = p.student_id || p.linked_student_id || p.derived_student_id || p.resolved_student_id;
          const ids = new Set();
          if (sid) ids.add(String(sid));
          [p.payer_name, p.resolved_student_name, p.student_name, p.student_full_name, p.student].filter(Boolean).forEach(nm => {
            const n = fcNormName(nm);
            if (n && nameToIds.has(n)) nameToIds.get(n).forEach(id => ids.add(id));
          });
          addToIndex(d, ids);
        });
      });

      paymentRecordsPaidCache.forEach(pr => {
        const dates = fcExtractForClassDates(pr, pr.date);
        dates.forEach(d => {
          const ids = new Set();
          if (pr.student_id) ids.add(String(pr.student_id));
          addToIndex(d, ids);
        });
      });

      creditPaymentsCache.forEach(cp => {
        const d = (cp.applied_class_date || cp.class_date || '').split('T')[0];
        if (!d || !cp.student_id) return;
        addToIndex(d, new Set([String(cp.student_id)]));
      });

      // Absence index: "studentId-dateStr"
      absenceIndex.clear();
      absencesCache.forEach(a => {
        const d = (a.class_date || '').split('T')[0];
        if (d && a.student_id) absenceIndex.add(`${a.student_id}-${d}`);
      });

      // Skipped index: "dateStr-NORMALIZEDGROUP"
      skippedIndex.clear();
      skippedClassesCache.forEach(s => {
        const d = (s.class_date || '').split('T')[0];
        const gn = fcNormGroupCode(s.group_name);
        if (d && gn) skippedIndex.add(`${d}-${gn}`);
      });

      // Manual enrollment index
      manualEnrollmentSet.clear();
      manualEnrollmentsCache.forEach(me => {
        if (me.student_id && me.date) manualEnrollmentSet.add(`${me.student_id}-${me.date.split('T')[0]}`);
      });
    }

    function fcHasPayment(studentId, dateStr) {
      const nd = fcNormDate(dateStr);
      return paymentIndex.has(nd) && paymentIndex.get(nd).has(String(studentId));
    }

    function fcIsAbsent(studentId, dateStr) {
      return absenceIndex.has(`${studentId}-${dateStr}`);
    }

    function fcIsSkipped(dateStr, groupName) {
      return skippedIndex.has(`${dateStr}-${fcNormGroupCode(groupName)}`);
    }

    function fcGetUnpaidDates(student) {
      // Flexible group lookup — normalize both sides so "A" matches "Group A"
      const normStudentGroup = fcNormGroupCode(student.group_name || student.group_letter || '');
      const group = groupsCache.find(g => fcNormGroupCode(g.group_name) === normStudentGroup);
      if (!group) return [];
      const today = fcGetToday();
      // Use UTC midnight for the floor so the loop doesn't duplicate dates in PT timezone
      const FLOOR_STR = '2026-04-01';
      const floorTime = Date.UTC(2026, 3, 1);
      const todayTime = Date.UTC(today.getFullYear(), today.getMonth(), today.getDate());
      let startStr = null;
      if (student.start_date) startStr = student.start_date.split('T')[0];
      else if (student.created_at) startStr = new Date(student.created_at).toISOString().split('T')[0];
      const oneTimeDates = new Set(
        Array.isArray(group.one_time_schedules)
          ? group.one_time_schedules.map(ot => (ot.date || '').split('T')[0]).filter(Boolean)
          : []
      );
      const normGroupCode = fcNormGroupCode(group.group_name);
      const unpaid = [];
      for (let t = floorTime; t <= todayTime; t += 86400000) {
        const ds = new Date(t).toISOString().split('T')[0];
        const isManual = manualEnrollmentSet.has(`${student.id}-${ds}`);
        if (startStr && ds < startStr && !isManual) continue;
        if (!fcIsScheduledDate(ds, group) && !oneTimeDates.has(ds) && !isManual) continue;
        if (fcIsSkipped(ds, normGroupCode)) continue;
        if (!fcHasPayment(student.id, ds) && !fcIsAbsent(student.id, ds)) unpaid.push(ds);
      }
      return unpaid;
    }

    // Load payments from Supabase (current month only)
    async function loadPayments() {
      try {
        const now = new Date();
        const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split('T')[0];
        const endOfMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).toISOString().split('T')[0];

        // Load from both tables
        const [automatedResult, manualResult] = await Promise.all([
          supabaseClient
            .from('payments')
            .select('*')
            .gte('for_class', startOfMonth)
            .lte('for_class', endOfMonth),
          supabaseClient
            .from('payment_records')
            .select('*')
            .gte('date', startOfMonth)
            .lte('date', endOfMonth)
            .eq('status', 'paid')
        ]);

        const automated = automatedResult.data || [];
        const manual = manualResult.data || [];
        
        paymentsCache = [...automated, ...manual];
        return paymentsCache;
      } catch (error) {
        console.error('Error loading payments:', error);
        return [];
      }
    }

    // ── Payment reminder email (mirrors Calendar-NEW.html logic) ───────────────
    async function sendDebtReminderEmail(studentId) {
      const student = studentsCache.find(s => s.id === studentId);
      if (!student) { fcShowError('Student Not Found', 'Could not locate this student. Try refreshing the page.'); return; }

      // Parse email
      let cleanEmail = String(student.email || '').trim();
      if (cleanEmail.startsWith('[')) {
        try { const a = JSON.parse(cleanEmail); if (Array.isArray(a) && a.length) cleanEmail = String(a[0]).trim(); } catch(_) {}
      }
      if (!cleanEmail || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(cleanEmail)) {
        fcShowError('No Email On File', `<strong>${escapeHtml(student.name)}</strong> does not have a valid email address on record.<br><br>Please update their profile in Student Manager first.`);
        return;
      }

      const price = parseFloat(student.price_per_class) || 0;
      const unpaidDates = fcGetUnpaidDates(student);
      const unpaidClassDetails = unpaidDates.map(ds => ({
        date: ds,
        formattedDate: new Date(ds + 'T12:00:00').toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' }),
        amount: price
      }));
      const totalOwed = unpaidClassDetails.reduce((s, c) => s + c.amount, 0) || Math.abs(Math.min(0, parseFloat(student.balance) || 0));
      const subject = 'Payment Reminder - ARNOMA NCLEX-RN';

      // Build email HTML then show preview
      const emailHTML = await fcBuildReminderHTML(student.name, totalOwed, price, unpaidClassDetails, studentId);

      fcShowEmailPreview(subject, emailHTML, student.name, async () => {
        try {
          const resp = await fetch(`${SUPABASE_URL}/functions/v1/send-email`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` },
            body: JSON.stringify({ to: cleanEmail, subject, html: emailHTML })
          });
          if (!resp.ok) { const e = await resp.json().catch(() => ({})); throw new Error(e.error?.message || e.error || 'Send failed'); }

          const { data: sentEmailRecord } = await supabaseClient.from('sent_emails').insert({
            recipient_email: cleanEmail,
            recipient_name: student.name,
            subject,
            email_type: 'payment_reminder',
            template_name: 'Payment Reminder',
            html_content: emailHTML,
            delivery_status: 'delivered',
            status: 'sent',
            sent_at: new Date().toISOString()
          }).select().maybeSingle();

          await supabaseClient.from('notifications').insert({
            type: 'email_sent',
            category: 'email',
            title: 'Payment Reminder Sent',
            description: `Sent payment reminder to ${student.name} (${cleanEmail}) for $${totalOwed.toFixed(2)}`,
            student_name: student.name,
            metadata: {
              student_id: studentId,
              student_name: student.name,
              email: cleanEmail,
              amount: totalOwed,
              email_type: 'payment_reminder',
              subject,
              sent_email_id: sentEmailRecord?.id || null,
              html: emailHTML
            },
            timestamp: new Date().toISOString(),
            read: false,
            created_at: new Date().toISOString()
          });

          fcShowToast(`✅ Payment reminder sent to ${student.name}!`, 'success');
        } catch (err) {
          console.error('Failed to send reminder:', err);
          fcShowToast(`❌ Failed to send: ${err.message}`, 'error');
        }
      });
    }

            classDateText = new Date().toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' });

    // Compute unpaid balances using Calendar-style logic (not status='unpaid')
    function loadUnpaidBalances() {
      fcBuildIndexes();
      unpaidByStudent = new Map();
      studentsCache.forEach(student => {
        const price = parseFloat(student.price_per_class) || 0;
        if (price <= 0) return;
        const unpaidDates = fcGetUnpaidDates(student);
        let owed = unpaidDates.length * price;
        // Also consider ledger balance: negative balance = debt
        const ledgerDebt = Math.abs(Math.min(0, parseFloat(student.balance) || 0));
        if (ledgerDebt > owed) owed = ledgerDebt;
        if (owed > 0) unpaidByStudent.set(student.id, owed);
      });
    }

    // Count weekly classes for a group
    function countWeeklyClasses(groupLetter) {
      if (!groupLetter || !groupLetter.trim()) return 0;

      // Find group by matching group_name (which should be like "Group A", "Group B", etc.)
      const group = groupsCache.find(g => {
        const normalizedGroupName = (g.group_name || g.name || '').toLowerCase();
        const normalizedLetter = groupLetter.toLowerCase().trim();
        
        // Match "Group A" with "A" or "group a" with "a"
        return normalizedGroupName === `group ${normalizedLetter}` || 
               normalizedGroupName === normalizedLetter;
      });

      if (!group || !group.schedule) return 0;

      // Parse schedule string (e.g., "Monday 8:00 PM, Wednesday 8:00 PM, Friday 8:00 PM")
      const scheduleString = group.schedule.trim();
      if (!scheduleString) return 0;

      // Split by comma and count non-empty slots
      const slots = scheduleString.split(',').filter(slot => slot.trim() !== '');
      return slots.length;
    }

    // Calculate actual monthly earnings
    function calculateActualMonthlyEarnings() {
      let total = 0;

      paymentsCache.forEach(payment => {
        const amount = parseFloat(payment.amount) || 0;
        total += amount;
      });

      return total;
    }

    // Update forecast data
    function updateForecastData() {
      // Filter ONLY active students (not paused or graduated)
      const activeStudents = studentsCache.filter(s => {
        const status = (s.status || 'active').toLowerCase();
        return status === 'active' && s.show_in_grid !== false;
      });

      let totalWeekly = 0;
      let activeCount = 0;

      activeStudents.forEach(student => {
        const pricePerClass = parseFloat(student.price_per_class) || 0;
        if (pricePerClass <= 0) return;

        const groupLetter = student.group_letter || student.group_name || '';
        if (!groupLetter.trim()) return;

        const weeklyClasses = countWeeklyClasses(groupLetter);
        if (weeklyClasses <= 0) return;

        const studentWeekly = pricePerClass * weeklyClasses;
        totalWeekly += studentWeekly;
        activeCount++;
      });

      const totalMonthly = totalWeekly * 4;
      const actualEarnings = calculateActualMonthlyEarnings();

      // Update UI
      document.getElementById('forecastActiveCount').textContent = activeCount;
      document.getElementById('forecastWeekly').textContent = formatCurrency(totalWeekly, '$');
      document.getElementById('forecastMonthly').textContent = formatCurrency(totalMonthly, '$');
      document.getElementById('forecastActual').textContent = formatCurrency(actualEarnings, '$');
    }

    // Toggle student status (active <-> paused)
    async function toggleStudentStatus(studentId, currentStatus) {
      try {
        const student = studentsCache.find(s => s.id === studentId);
        if (!student) {
          console.error('Student not found:', studentId);
          return;
        }

        // Toggle between active and paused
        const newStatus = currentStatus === 'active' ? 'paused' : 'active';

        // Update in Supabase
        const { error } = await supabaseClient
          .from('students')
          .update({ status: newStatus })
          .eq('id', studentId);

        if (error) throw error;

        // Update local cache
        student.status = newStatus;

        // Refresh displays
        updateForecastData();
        updateStudentBreakdown();

        console.log(`✅ Student ${student.name} status changed to: ${newStatus}`);
      } catch (error) {
        console.error('Error updating student status:', error);
        alert('Failed to update student status. Please try again.');
      }
    }

    // Update student breakdown

        if (s.show_in_grid === false) return false;
        const status = (s.status || 'active').toLowerCase();
        return status === 'active' || status === 'paused';
      });

      // When unpaid filter is active, keep only students with an outstanding balance
      if (showOnlyUnpaid) {
        eligibleStudents = eligibleStudents.filter(s =>
          !ignoredDebtStudents.has(String(s.id)) && (unpaidByStudent.get(s.id) || 0) > 0
        );
      }

      let totalWeekly = 0;
      let html = '';
      const studentData = [];

      eligibleStudents.forEach(student => {
        const pricePerClass = parseFloat(student.price_per_class) || 0;
        if (pricePerClass <= 0) return;

        const groupLetter = student.group_letter || student.group_name || '';
        if (!groupLetter.trim()) return;

        const weeklyClasses = countWeeklyClasses(groupLetter);
        if (weeklyClasses <= 0) return;

        const studentWeekly = pricePerClass * weeklyClasses;
        const studentMonthly = studentWeekly * 4;
        const status = (student.status || 'active').toLowerCase();

        // Only count active students in total
        if (status === 'active') {
          totalWeekly += studentWeekly;
        }

        const amountOwed = ignoredDebtStudents.has(String(student.id)) ? 0 : (unpaidByStudent.get(student.id) || 0);

        studentData.push({
          id: student.id,
          name: student.name,
          group: groupLetter,
          pricePerClass,
          weeklyClasses,
          studentWeekly,
          studentMonthly,
          status,
          amountOwed
        });
      });

      // Sort by status then name
      studentData.sort((a, b) => {
        if (a.status === 'active' && b.status === 'paused') return -1;
        if (a.status === 'paused' && b.status === 'active') return 1;
        return a.name.localeCompare(b.name);

      // Generate HTML
      studentData.forEach(data => {
        const isPaused = data.status === 'paused';

        html += `

                    ${statusLabel}

                </div>
                <div class="student-details">${pausedPrefix}Group ${escapeHtml(data.group)} • ${data.weeklyClasses} classes/week • ${formatCurrency(data.pricePerClass, '$')}/class${opacityNote}</div>
              </div>
            </div>
            <div class="student-grid">
              <div class="student-stat">
                <div class="student-stat-label">Weekly</div>
                <div class="student-stat-value">${formatCurrency(data.studentWeekly, '$')}</div>
              </div>
              <div class="student-stat monthly">
                <div class="student-stat-label">Monthly</div>
                <div class="student-stat-value">${formatCurrency(data.studentMonthly, '$')}</div>
              </div>
            </div>
            ${dimClose}
            ${data.amountOwed > 0 ? `
            <div style="margin-top: 10px; padding: 10px 12px; background: rgba(239,68,68,0.18); border: 1px solid rgba(239,68,68,0.6); border-radius: 8px;">
              <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">

                <div style="font-size: 18px; font-weight: 900; color: #fca5a5;">${formatCurrency(data.amountOwed, '$')}</div>
              </div>
              <div style="display: flex; gap: 8px;">
                <button onclick="sendDebtReminderEmail(${data.id})" style="flex:1; padding: 6px 10px; background: rgba(99,102,241,0.25); border: 1px solid rgba(99,102,241,0.5); border-radius: 6px; color: #a5b4fc; font-size: 11px; font-weight: 700; cursor: pointer; transition: background 0.2s;" onmouseover="this.style.background='rgba(99,102,241,0.4)'" onmouseout="this.style.background='rgba(99,102,241,0.25)'">📧 Send Reminder</button>

              </div>
            </div>` : ''}
          </div>
        `;
      });

      if (studentData.length === 0) {
        html = '<div class="no-data">No active or paused students with pricing and schedules</div>';
      }

      container.innerHTML = html;

      // Update totals (only active students)
      const totalMonthly = totalWeekly * 4;
      document.getElementById('breakdownTotalWeekly').textContent = formatCurrency(totalWeekly, '$');
      document.getElementById('breakdownTotalMonthly').textContent = formatCurrency(totalMonthly, '$');
      updateTotalDebtPill();
