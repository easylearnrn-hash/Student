<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password – ACNHS</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.1"></script>
  <style>
    :root {
      --glass-bg: rgba(255,255,255,0.08);
      --glass-border: rgba(255,255,255,0.2);
      --neon-cyan: #26ffe6;
      --neon-purple: #8a4dff;
      --text-light: #e8e8e8;
      --text-dim: #9a9a9a;
      --radius: 22px;
      --blur: 18px;
    }
    *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Inter','Poppins',sans-serif;}
    body{min-height:100vh;width:100%;background:radial-gradient(circle at 20% 20%,#0f1120,#05060a 80%);display:flex;align-items:center;justify-content:center;color:var(--text-light);}
    .neon-orb{position:fixed;width:380px;height:380px;border-radius:50%;background:radial-gradient(circle,rgba(0,255,230,.45),transparent 70%);filter:blur(55px);top:-120px;left:-80px;opacity:.6;pointer-events:none;}
    .neon-orb2{position:fixed;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(128,0,255,.35),transparent 70%);filter:blur(65px);bottom:-140px;right:-100px;opacity:.5;pointer-events:none;}
    .card{
      background:var(--glass-bg);
      border:1px solid var(--glass-border);
      backdrop-filter:blur(var(--blur));
      -webkit-backdrop-filter:blur(var(--blur));
      border-radius:var(--radius);
      padding:40px 36px;
      width:100%;
      max-width:420px;
      text-align:center;
      position:relative;
      z-index:1;
    }
    .logo{font-size:2rem;margin-bottom:8px;}
    h1{font-size:1.4rem;font-weight:700;margin-bottom:6px;background:linear-gradient(135deg,var(--neon-cyan),var(--neon-purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .subtitle{color:var(--text-dim);font-size:.9rem;margin-bottom:28px;}
    label{display:block;text-align:left;font-size:.82rem;color:var(--text-dim);margin-bottom:6px;}
    .input-wrap{position:relative;margin-bottom:18px;}
    input[type=password]{
      width:100%;padding:13px 44px 13px 16px;
      background:rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.15);
      border-radius:12px;color:#fff;font-size:.95rem;outline:none;
      transition:border .2s;
    }
    input[type=password]:focus{border-color:var(--neon-cyan);}
    .eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-dim);font-size:1.1rem;padding:2px;}
    .btn{
      width:100%;padding:14px;border:none;border-radius:14px;
      background:linear-gradient(135deg,var(--neon-cyan),var(--neon-purple));
      color:#0f1120;font-weight:700;font-size:1rem;cursor:pointer;
      transition:opacity .2s,transform .1s;margin-top:4px;
    }
    .btn:hover{opacity:.9;}
    .btn:active{transform:scale(.98);}
    .btn:disabled{opacity:.5;cursor:not-allowed;}
    .msg{margin-top:18px;font-size:.9rem;min-height:22px;}
    .msg.success{color:var(--neon-cyan);}
    .msg.error{color:#f87171;}
    .back-link{display:block;margin-top:20px;color:var(--text-dim);font-size:.85rem;text-decoration:none;}
    .back-link:hover{color:var(--neon-cyan);}
    .strength-bar{height:4px;border-radius:2px;background:rgba(255,255,255,.1);margin-bottom:6px;overflow:hidden;}
    .strength-fill{height:100%;width:0%;transition:width .3s,background .3s;border-radius:2px;}
  </style>
</head>
<body>
<div class="neon-orb"></div>
<div class="neon-orb2"></div>

<div class="card">
  <div class="logo">🔒</div>
  <h1>Set New Password</h1>
  <p class="subtitle">Enter a new password for your account</p>

  <div id="form-section">
    <label for="new-password">New Password</label>
    <div class="input-wrap">
      <input type="password" id="new-password" placeholder="At least 8 characters" autocomplete="new-password"/>
      <button class="eye-btn" type="button" onclick="toggleEye('new-password','eye1')" id="eye1">👁</button>
    </div>
    <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>

    <label for="confirm-password">Confirm Password</label>
    <div class="input-wrap">
      <input type="password" id="confirm-password" placeholder="Repeat password" autocomplete="new-password"/>
      <button class="eye-btn" type="button" onclick="toggleEye('confirm-password','eye2')" id="eye2">👁</button>
    </div>

    <button class="btn" id="reset-btn" onclick="doReset()">Update Password</button>
    <div class="msg" id="msg"></div>
  </div>

  <a href="index.html" class="back-link">← Back to Login</a>
</div>

<script>
  const SUPABASE_URL = 'https://zlvnxvrzotamhpezqedr.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpsdm54dnJ6b3RhbWhwZXpxZWRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjI4MTEzMTcsImV4cCI6MjA3ODM4NzMxN30.-IoSqKhDrA9NuG4j3GufIbfmodWqCoppEklE1nTmw38';
  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // Parse hash tokens from URL — Supabase puts them here on redirect
  function getHashParams() {
    const hash = window.location.hash.substring(1);
    const params = {};
    hash.split('&').forEach(part => {
      const [k, v] = part.split('=');
      if (k) params[decodeURIComponent(k)] = decodeURIComponent(v || '');
    });
    return params;
  }

  // On load — set session from URL tokens so updateUser() works
  window.addEventListener('load', async function () {
    const params = getHashParams();
    if (params.access_token && params.refresh_token) {
      await supabaseClient.auth.setSession({
        access_token: params.access_token,
        refresh_token: params.refresh_token
      });
    } else if (!params.access_token) {
      showMsg('Invalid or expired reset link. Please request a new one.', 'error');
      document.getElementById('reset-btn').disabled = true;
    }
  });

  // Password strength indicator
  document.getElementById('new-password').addEventListener('input', function () {
    const val = this.value;
    const fill = document.getElementById('strength-fill');
    let strength = 0;
    if (val.length >= 8) strength++;
    if (/[A-Z]/.test(val)) strength++;
    if (/[0-9]/.test(val)) strength++;
    if (/[^A-Za-z0-9]/.test(val)) strength++;
    const colors = ['#f87171','#fb923c','#facc15','#4ade80'];
    fill.style.width = (strength * 25) + '%';
    fill.style.background = colors[strength - 1] || 'transparent';
  });

  function toggleEye(inputId, btnId) {
    const input = document.getElementById(inputId);
    const btn = document.getElementById(btnId);
    if (input.type === 'password') { input.type = 'text'; btn.textContent = '🙈'; }
    else { input.type = 'password'; btn.textContent = '👁'; }
  }

  function showMsg(text, type) {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className = 'msg ' + type;
  }

  async function doReset() {
    const newPass = document.getElementById('new-password').value.trim();
    const confirmPass = document.getElementById('confirm-password').value.trim();
    const btn = document.getElementById('reset-btn');

    if (!newPass) return showMsg('Please enter a new password.', 'error');
    if (newPass.length < 8) return showMsg('Password must be at least 8 characters.', 'error');
    if (newPass !== confirmPass) return showMsg('Passwords do not match.', 'error');

    btn.disabled = true;
    btn.textContent = 'Updating…';

    const { error } = await supabaseClient.auth.updateUser({ password: newPass });

    if (error) {
      showMsg(error.message || 'Failed to update password. Try requesting a new reset link.', 'error');
      btn.disabled = false;
      btn.textContent = 'Update Password';
    } else {
      showMsg('✅ Password updated! Redirecting to login…', 'success');
      document.getElementById('form-section').style.opacity = '0.4';
      document.getElementById('form-section').style.pointerEvents = 'none';
      setTimeout(() => { window.location.href = 'index.html'; }, 2500);
    }
  }

  // Allow Enter key
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doReset();
  });
</script>
</body>
</html>
