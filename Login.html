<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ACN Login | Armenian College of Nurses</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg-dark:#0a2540;
  --bg-darker:#020617;
  --accent:#2dd4bf;
  --glass:rgba(255,255,255,.08);
  --border:rgba(255,255,255,.15);
  --text-muted:#94a3b8;
}

*{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',sans-serif}
body{
  min-height:100vh;
  background:linear-gradient(135deg,var(--bg-dark),var(--bg-darker));
  display:flex;align-items:center;justify-content:center;
  color:white;
}

/* BACKGROUND GLOW */
body::before{
  content:"";
  position:absolute;inset:0;
  background:radial-gradient(circle at top,rgba(45,212,191,.18),transparent 60%);
}

/* LOGIN CARD */
.login-card{
  position:relative;
  width:100%;
  max-width:420px;
  background:var(--glass);
  backdrop-filter:blur(18px);
  border:1px solid var(--border);
  border-radius:22px;
  padding:40px;
  box-shadow:0 30px 60px rgba(0,0,0,.4);
}

/* HEADER */
.login-title{
  text-align:center;
  margin-bottom:30px;
}
.login-title h1{
  font-size:22px;
  font-weight:800;
}
.login-title p{
  font-size:13px;
  color:var(--text-muted);
  margin-top:6px;
}

/* ROLE SWITCH */
.role-switch{
  display:flex;
  background:rgba(255,255,255,.05);
  border-radius:12px;
  overflow:hidden;
  margin-bottom:24px;
}
.role-switch button{
  flex:1;
  padding:12px;
  border:none;
  background:transparent;
  color:#cbd5e1;
  font-weight:600;
  cursor:pointer;
}
.role-switch button.active{
  background:var(--accent);
  color:#022c22;
}

/* FORM */
label{
  font-size:12px;
  color:#cbd5e1;
}
input{
  width:100%;
  padding:14px;
  margin:8px 0 18px;
  border-radius:12px;
  border:1px solid var(--border);
  background:rgba(255,255,255,.05);
  color:white;
  outline:none;
}
input::placeholder{color:#94a3b8}

/* BUTTON */
.login-btn{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:none;
  background:var(--accent);
  color:#022c22;
  font-weight:700;
  cursor:pointer;
  margin-top:6px;
}

/* FOOTER */
.login-footer{
  text-align:center;
  margin-top:20px;
  font-size:12px;
  color:var(--text-muted);
}
.login-footer a{
  color:var(--accent);
  text-decoration:none;
}
</style>
</head>

<body>

<div class="login-card">

  <div class="login-title">
    <h1>Armenian College of Nurses</h1>
    <p>Secure Academic Access</p>
  </div>

  <div class="role-switch">
    <button id="studentBtn" class="active">Student Login</button>
    <button id="adminBtn">Admin Login</button>
  </div>

  <form id="loginForm">
    <label>Email</label>
    <input type="email" placeholder="you@example.com" required>

    <label>Password</label>
    <input type="password" placeholder="••••••••" required>

    <button class="login-btn" type="submit">
      Sign In
    </button>
  </form>

  <div class="login-footer">
    <p>© Armenian College of Nurses</p>
    <p><a href="index.html">← Back to Website</a></p>
  </div>

</div>

<script>
const studentBtn = document.getElementById('studentBtn');
const adminBtn   = document.getElementById('adminBtn');

studentBtn.onclick = () => {
  studentBtn.classList.add('active');
  adminBtn.classList.remove('active');
};

adminBtn.onclick = () => {
  adminBtn.classList.add('active');
  studentBtn.classList.remove('active');
};

document.getElementById('loginForm').addEventListener('submit', e => {
  e.preventDefault();
  alert('Login logic will be connected to backend.');
});
</script>

</body>
</html>
