<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ARNOMA – Secure Payment</title>
    <script src="https://js.stripe.com/v3/"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg:       #0a0a0a;
        --surface:  #111111;
        --surface2: #161616;
        --border:   #2a2a2a;
        --gold:     #c9a84c;
        --gold2:    #e8c97a;
        --gold-dim: rgba(201,168,76,0.18);
        --gold-glow:rgba(201,168,76,0.30);
        --text:     #f5f0e8;
        --muted:    #777060;
        --muted2:   #999080;
        --red:      #c0392b;
        --green:    #27ae60;
      }

      *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
      html, body { 
        height:100%; 
        scrollbar-width: none; /* Firefox */
        -ms-overflow-style: none;  /* IE and Edge */
      }
      html::-webkit-scrollbar, body::-webkit-scrollbar {
        display: none; /* Chrome, Safari and Opera */
      }

      body {
        min-height: 100vh;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        background: var(--bg);
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        color: var(--text);
        padding: 24px 16px;
        overflow-y: auto;
        overflow-x: hidden;
        -ms-overflow-style: none;  /* IE and Edge */
        scrollbar-width: none;  /* Firefox */
      }

      body::-webkit-scrollbar {
        display: none; /* Chrome, Safari and Opera */
      }

      /* ── Card ── */
      .card {
        margin: auto;
        width: 100%;
        max-width: 440px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 24px 24px 20px;
        box-shadow: 0 24px 64px rgba(0,0,0,0.7), 0 0 0 1px rgba(201,168,76,0.06) inset;
        animation: fadeUp 0.35s cubic-bezier(0.16,1,0.3,1);
        position: relative;
      }

      /* gold top-edge accent */
      .card::before {
        content: '';
        position: absolute;
        top: 0; left: 10%; right: 10%;
        height: 1px;
        background: linear-gradient(90deg, transparent, var(--gold), transparent);
        border-radius: 1px;
      }

      @keyframes fadeUp {
        from { opacity:0; transform:translateY(14px) scale(0.98); }
        to   { opacity:1; transform:translateY(0) scale(1); }
      }

      /* ── Header ── */
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 18px;
        padding-bottom: 16px;
        border-bottom: 1px solid var(--border);
      }

      .brand { display:flex; align-items:center; gap:10px; }

      .brand-icon {
        width: 38px; height: 38px;
        border-radius: 10px;
        background: linear-gradient(135deg, #1a1506 0%, #2e2208 100%);
        border: 1px solid rgba(201,168,76,0.35);
        display: flex; align-items:center; justify-content:center;
        flex-shrink: 0;
        box-shadow: 0 4px 14px rgba(201,168,76,0.15);
      }

      .brand-icon svg {
        width: 18px; height: 18px;
        fill: none;
        stroke: var(--gold);
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .brand-name {
        font-size: 14px;
        font-weight: 800;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        background: linear-gradient(135deg, var(--gold2), var(--gold));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .brand-sub {
        font-size: 10px;
        color: var(--muted);
        letter-spacing: 0.04em;
        margin-top: 2px;
        font-weight: 400;
      }

      .secure-badge {
        display: flex;
        align-items: center;
        gap: 4px;
        background: rgba(39,174,96,0.08);
        border: 1px solid rgba(39,174,96,0.22);
        border-radius: 20px;
        padding: 4px 9px;
        font-size: 10px;
        font-weight: 600;
        color: #5cba7d;
        letter-spacing: 0.04em;
      }

      .secure-badge svg { width:10px; height:10px; stroke:#5cba7d; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }

      /* ── Invoice banner ── */
      .invoice-banner {
        background: linear-gradient(135deg, rgba(201,168,76,0.07) 0%, rgba(201,168,76,0.03) 100%);
        border: 1px solid rgba(201,168,76,0.2);
        border-radius: 14px;
        padding: 14px 16px;
        margin-bottom: 18px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        position: relative;
        overflow: hidden;
      }

      .invoice-banner::before {
        content: '';
        position: absolute;
        top: 0; left: 10%; right: 10%;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(201,168,76,0.4), transparent);
      }

      .invoice-label {
        font-size: 9px;
        font-weight: 700;
        color: var(--muted2);
        text-transform: uppercase;
        letter-spacing: 0.12em;
        margin-bottom: 4px;
      }

      .invoice-student {
        font-size: 14px;
        font-weight: 700;
        color: var(--text);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 200px;
      }

      .invoice-right { text-align:right; flex-shrink:0; }

      .invoice-amount {
        font-size: 26px;
        font-weight: 800;
        background: linear-gradient(135deg, var(--gold2), var(--gold));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1;
        letter-spacing: -0.01em;
      }

      .invoice-currency-label {
        font-size: 9px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-top: 3px;
      }

      /* ── Amount to pay (editable) ── */
      .amount-edit-label {
        font-size: 9px;
        font-weight: 700;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-bottom: 5px;
      }
      .amount-edit-row {
        display: flex;
        align-items: center;
        gap: 5px;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 9px;
        padding: 5px 10px;
        transition: border-color 0.2s;
      }
      .amount-edit-row:focus-within {
        border-color: var(--gold);
        box-shadow: 0 0 0 2px rgba(201,168,76,0.12);
      }
      .amount-edit-prefix {
        font-size: 14px;
        font-weight: 700;
        color: var(--gold);
        flex-shrink: 0;
      }
      .amount-edit-input {
        background: none;
        border: none;
        outline: none;
        font-family: inherit;
        font-size: 18px;
        font-weight: 800;
        color: var(--gold2);
        width: 90px;
        text-align: right;
        -moz-appearance: textfield;
      }
      .amount-edit-input::-webkit-inner-spin-button,
      .amount-edit-input::-webkit-outer-spin-button { -webkit-appearance: none; }
      .amount-hint {
        font-size: 9px;
        color: var(--muted);
        margin-top: 3px;
        text-align: right;
      }
      .amount-hint.warn { color: #e07060; }

      /* ── Divider ── */
      .divider {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 16px;
      }
      .divider-line { flex:1; height:1px; background:var(--border); }
      .divider-text {
        font-size: 9px;
        font-weight: 700;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.12em;
      }

      /* ── Stripe element ── */
      #payment-element { margin-bottom:16px; min-height:100px; }

      /* ── Status messages ── */
      .status-msg {
        font-size: 12px;
        padding: 10px 13px;
        border-radius: 10px;
        margin-bottom: 14px;
        display: none;
        line-height: 1.5;
        font-weight: 500;
        align-items: center;
        gap: 8px;
      }
      .status-msg.info  { display:flex; background:rgba(201,168,76,0.06); border:1px solid rgba(201,168,76,0.2); color:#d4b86a; }
      .status-msg.error { display:flex; background:rgba(192,57,43,0.08);  border:1px solid rgba(192,57,43,0.25); color:#e07060; }
      .status-msg.success { display:block; background:rgba(39,174,96,0.07); border:1px solid rgba(39,174,96,0.22); color:#5cba7d; text-align:center; font-size:14px; font-weight:600; padding:22px 16px; }
      .msg-icon { font-size:14px; flex-shrink:0; }

      /* ── Spinner ── */
      .spinner {
        display: inline-block;
        width: 15px; height: 15px;
        border: 2px solid rgba(10,10,10,0.3);
        border-top-color: #0a0a0a;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
        vertical-align: middle;
        margin-right: 7px;
      }
      @keyframes spin { to { transform:rotate(360deg); } }

      /* ── Pay button ── */
      .pay-btn {
        width: 100%;
        padding: 14px 20px;
        border: none;
        border-radius: 12px;
        background: linear-gradient(135deg, #c9a84c 0%, #e8c97a 50%, #c9a84c 100%);
        background-size: 200% 100%;
        color: #0a0a0a;
        font-family: inherit;
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        cursor: pointer;
        transition: background-position 0.4s ease, transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
        position: relative;
        overflow: hidden;
      }

      .pay-btn::after {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 45%;
        background: linear-gradient(180deg, rgba(255,255,255,0.14), transparent);
        pointer-events: none;
      }

      .pay-btn:hover:not(:disabled) {
        background-position: 100% 0;
        transform: translateY(-1px);
        box-shadow: 0 8px 24px rgba(201,168,76,0.40), 0 2px 8px rgba(0,0,0,0.4);
      }
      .pay-btn:active:not(:disabled) { transform:translateY(0); box-shadow:0 3px 10px rgba(201,168,76,0.25); }
      .pay-btn:disabled { opacity:0.45; cursor:not-allowed; }

      /* ── Footer ── */
      .footer {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        margin-top: 16px;
        padding-top: 14px;
        border-top: 1px solid var(--border);
      }
      .footer-item {
        display: flex;
        align-items: center;
        gap: 4px;
        font-size: 10px;
        color: var(--muted);
        font-weight: 500;
        letter-spacing: 0.02em;
      }
      .footer-item svg { width:11px; height:11px; opacity:0.55; flex-shrink:0; }
      .footer-dot { width:2px; height:2px; border-radius:50%; background:var(--muted); opacity:0.35; }

      /* ── Success ── */
      .success-icon {
        width: 56px; height: 56px;
        border-radius: 50%;
        background: rgba(39,174,96,0.10);
        border: 1px solid rgba(39,174,96,0.25);
        display: flex; align-items:center; justify-content:center;
        margin: 0 auto 12px;
        animation: popIn 0.4s cubic-bezier(0.16,1,0.3,1);
      }
      .success-icon svg { width:26px; height:26px; stroke:#5cba7d; stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round; fill:none; }
      @keyframes popIn { from{transform:scale(0.5);opacity:0;} to{transform:scale(1);opacity:1;} }
      .success-title { font-size:16px; font-weight:800; color:var(--text); margin-bottom:5px; }
      .success-sub { font-size:12px; color:var(--muted2); font-weight:400; line-height:1.5; }
    </style>
  </head>
  <body>

    <div class="card" id="payCard">

      <div class="header">
        <div class="brand">
          <div class="brand-icon">
            <svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/><line x1="6" y1="15" x2="10" y2="15"/></svg>
          </div>
          <div>
            <div class="brand-name">ARNOMA</div>
            <div class="brand-sub">Secure Payment Portal</div>
          </div>
        </div>
        <div class="secure-badge">
          <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          SSL Secured
        </div>
      </div>

      <div class="invoice-banner" id="invoiceBanner">
        <div>
          <div class="invoice-label">Paying for</div>
          <div class="invoice-student" id="displayName">Loading…</div>
        </div>
        <div class="invoice-right">
          <div class="amount-edit-label">Amount to Pay</div>
          <div class="amount-edit-row">
            <span class="amount-edit-prefix">$</span>
            <input
              class="amount-edit-input"
              id="amountInput"
              type="number"
              min="1"
              step="0.01"
              placeholder="0.00"
              inputmode="decimal"
            />
          </div>
          <div class="amount-hint" id="amountHint">Balance due: —</div>
        </div>
      </div>

      <div class="divider">
        <div class="divider-line"></div>
        <div class="divider-text">Payment Details</div>
        <div class="divider-line"></div>
      </div>

      <div id="payment-element"></div>
      <div class="status-msg" id="statusMsg"></div>
      <button class="pay-btn" id="payBtn" disabled>Loading…</button>

      <div class="footer">
        <div class="footer-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          256-bit Encryption
        </div>
        <div class="footer-dot"></div>
        <div class="footer-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
          PCI Compliant
        </div>
        <div class="footer-dot"></div>
        <div class="footer-item">Powered by Stripe</div>
      </div>

    <script>
      /* ── CONFIG ── */
      const STRIPE_PK = 'pk_live_51HKvyeKHAwZsjk64kBQ6PrmVb409AuCXdDmCPQX3z5y3j4sRc9CZDomsG8TXrBDa6xapO2jtWlpOl8pTR92FlNYX00vCScBYzF';
      const SUPABASE_URL = 'https://zlvnxvrzotamhpezqedr.supabase.co';
      const CREATE_PI_ENDPOINT = `${SUPABASE_URL}/functions/v1/create-payment-intent`;

      /* ── Parse URL params (set by student-portal.html) ── */
      const params = new URLSearchParams(window.location.search);
      const INVOICE = {
        studentName  : params.get('student')         || params.get('student_name') || 'Student',
        studentEmail : params.get('email')            || '',
        studentId    : params.get('student_id')       || '',
        amountDollars: parseFloat(params.get('amount') || '0'),
        currency     : (params.get('currency')        || 'usd').toLowerCase(),
        invoiceRef   : params.get('invoice')          || params.get('invoice_ref') || '',
        forClass     : params.get('for_class')        || '',
        forClassDates: params.get('for_class_dates')  || '',
      };

      const STRIPE_TAX_RATE = 0.05; // 5%

      /* ── DOM refs ── */
      const $name    = document.getElementById('displayName');
      const $amtInput= document.getElementById('amountInput');
      const $amtHint = document.getElementById('amountHint');
      const $msg     = document.getElementById('statusMsg');
      const $payBtn  = document.getElementById('payBtn');
      const $peSlot  = document.getElementById('payment-element');

      /* ── Live amount helpers ── */
      function roundMoney(value) {
        return Math.round((Number(value) || 0) * 100) / 100;
      }
      function getEnteredAmount() {
        return roundMoney(parseFloat($amtInput.value));
      }
      function getTaxAmount(subtotal = getEnteredAmount()) {
        return roundMoney(subtotal * STRIPE_TAX_RATE);
      }
      function getPayAmount() {
        const subtotal = getEnteredAmount();
        return roundMoney(subtotal + getTaxAmount(subtotal));
      }
      function getAmountBreakdown() {
        const subtotal = getEnteredAmount();
        const tax = getTaxAmount(subtotal);
        const total = roundMoney(subtotal + tax);
        return { subtotal, tax, total };
      }

      /* ── Helpers ── */
      function fmt(dollars, currency) {
        return new Intl.NumberFormat('en-US', {
          style:'currency', currency:(currency||'usd').toUpperCase(), minimumFractionDigits:2
        }).format(dollars);
      }
      function setMsg(kind, text) {
        const icons = { info: '⏳', error: '⚠️' };
        $msg.className = `status-msg ${kind}`;
        $msg.innerHTML = kind !== 'success'
          ? `<span class="msg-icon">${icons[kind]||''}</span><span>${text}</span>`
          : text;
      }
      function clearMsg() { $msg.className = 'status-msg'; $msg.innerHTML = ''; }
      function setBtnLoading(yes) {
        $payBtn.disabled = yes;
        const { total } = getAmountBreakdown();
        $payBtn.innerHTML = yes
          ? `<span class="spinner"></span> Processing…`
          : `Pay ${fmt(total, INVOICE.currency)} (incl. 5% tax)`;
      }

      /* ── Render summary ── */
      function renderSummary() {
        $name.textContent = INVOICE.studentName;
        // Pre-fill amount input with full balance
        if (INVOICE.amountDollars > 0) {
          $amtInput.value = INVOICE.amountDollars.toFixed(2);
          $amtInput.max   = INVOICE.amountDollars.toFixed(2);
        }
        const initialTax = getTaxAmount(INVOICE.amountDollars);
        const initialTotal = roundMoney(INVOICE.amountDollars + initialTax);
        $amtHint.textContent = `Subtotal due: ${INVOICE.amountDollars > 0 ? fmt(INVOICE.amountDollars, INVOICE.currency) : '—'} • Tax (5%): ${fmt(initialTax, INVOICE.currency)} • Total: ${fmt(initialTotal, INVOICE.currency)}`;
        // Validate on change
        $amtInput.addEventListener('input', () => {
          const v   = getEnteredAmount();
          const max = INVOICE.amountDollars;
          if (v <= 0) {
            $amtHint.textContent = 'Enter an amount (min $1.00)';
            $amtHint.className   = 'amount-hint warn';
            $payBtn.disabled     = true;
          } else if (max > 0 && v > max) {
            $amtInput.value      = max.toFixed(2);
            const maxTax = getTaxAmount(max);
            const maxTotal = roundMoney(max + maxTax);
            $amtHint.textContent = `Max subtotal: ${fmt(max, INVOICE.currency)} • Tax (5%): ${fmt(maxTax, INVOICE.currency)} • Total: ${fmt(maxTotal, INVOICE.currency)}`;
            $amtHint.className   = 'amount-hint warn';
            $payBtn.disabled     = false;
          } else {
            const { subtotal, tax, total } = getAmountBreakdown();
            $amtHint.textContent = `Subtotal: ${fmt(subtotal, INVOICE.currency)} • Tax (5%): ${fmt(tax, INVOICE.currency)} • Total: ${fmt(total, INVOICE.currency)}`;
            $amtHint.className   = 'amount-hint';
            $payBtn.disabled     = false;
          }
          // Update button label
          $payBtn.textContent = `Pay ${fmt(getPayAmount(), INVOICE.currency)} (incl. 5% tax)`;
        });
      }

      /* ── Step 1: get clientSecret from Edge Function ── */
      async function fetchClientSecret() {
        const subtotal = getEnteredAmount();
        const total = getPayAmount();
        const tax = getTaxAmount(subtotal);
        if (subtotal < 1) throw new Error('Please enter an amount of at least $1.00.');
        const resp = await fetch(CREATE_PI_ENDPOINT, {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({
            amount_cents    : Math.round(total * 100),
            currency        : INVOICE.currency,
            student_id      : INVOICE.studentId,
            student_name    : INVOICE.studentName,
            student_email   : INVOICE.studentEmail,
            invoice_ref     : INVOICE.invoiceRef,
            for_class       : INVOICE.forClass,
            for_class_dates : INVOICE.forClassDates,
            subtotal_dollars: subtotal,
            tax_dollars     : tax,
            tax_rate        : STRIPE_TAX_RATE,
          }),
        });
        if (!resp.ok) {
          const err = await resp.text().catch(() => resp.status);
          throw new Error(`Server error (${resp.status}): ${String(err).slice(0,180)}`);
        }
        const data = await resp.json();
        if (!data.clientSecret) throw new Error('Server did not return a clientSecret.');
        return data.clientSecret;
      }

      let stripe, elements;
      async function mountPaymentElement(clientSecret) {
        stripe   = window.Stripe(STRIPE_PK);
        elements = stripe.elements({
          clientSecret,
          appearance:{
            theme:'night',
            variables:{
              colorPrimary    :'#c9a84c',
              colorBackground :'#111111',
              colorText       :'#f5f0e8',
              colorDanger     :'#c0392b',
              borderRadius    :'10px',
              fontFamily      :"'Inter',-apple-system,BlinkMacSystemFont,sans-serif",
              colorTextSecondary:'#999080',
              colorIconTab    :'#c9a84c',
            },
            rules: {
              '.Input': { border:'1px solid #2a2a2a', backgroundColor:'#161616' },
              '.Input:focus': { border:'1px solid #c9a84c', boxShadow:'0 0 0 2px rgba(201,168,76,0.15)' },
              '.Label': { color:'#777060', fontWeight:'600', letterSpacing:'0.06em', fontSize:'10px', textTransform:'uppercase' },
            }
          }
        });
        elements.create('payment', { layout:'tabs' }).mount('#payment-element');
        $payBtn.textContent = `Pay ${fmt(getPayAmount(), INVOICE.currency)} (incl. 5% tax)`;
        $payBtn.disabled    = false;
      }

      /* ── Step 3: confirm payment ── */
      async function handlePay() {
        if (!stripe || !elements) return;
        clearMsg();
        setBtnLoading(true);

        // Return URL points back to this same page so 3DS redirect lands here
        const returnUrl = window.location.href.split('?')[0] + '?' + window.location.search.slice(1);

        const { error, paymentIntent } = await stripe.confirmPayment({
          elements,
          confirmParams:{
            return_url   : window.location.href,
            receipt_email: INVOICE.studentEmail || undefined,
          },
          redirect:'if_required',
        });

        if (error) {
          setMsg('error', error.message || 'Payment failed. Please try again.');
          setBtnLoading(false);
          return;
        }

        if (paymentIntent && paymentIntent.status === 'succeeded') {
          await showSuccess();
          return;
        }

        setMsg('info', 'Redirecting to complete authentication…');
      }

      /* ── Success state ── */
      async function showSuccess() {
        $peSlot.innerHTML = '';
        $payBtn.style.display = 'none';
        document.getElementById('invoiceBanner').style.display = 'none';
        document.querySelector('.divider').style.display = 'none';
        $msg.className = 'status-msg success';
        $msg.innerHTML = `
          <div class="success-icon">
            <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <div class="success-title">Payment Successful</div>
          <div class="success-sub">Your payment has been processed.<br>A receipt will be sent to your email by Stripe.</div>
        `;

        // Parse for_class_dates JSON array sent by student-portal.html
        let forClassDatesArr = [];
        if (INVOICE.forClassDates) {
          try { forClassDatesArr = JSON.parse(INVOICE.forClassDates); } catch(_) {}
        }
        // Fall back to the comma-separated for_class string
        if (!forClassDatesArr.length && INVOICE.forClass) {
          forClassDatesArr = INVOICE.forClass.split(',').map(d => d.trim()).filter(Boolean);
        }
        const today = new Date().toISOString().split('T')[0];

        // Notify parent window (student-portal.html modal) — parent writes payment_records
        // using its own authenticated Supabase session, avoiding RLS issues with anon key.
        try {
          const { subtotal, tax, total } = getAmountBreakdown();
          window.parent.postMessage({
            type           : 'ARNOMA_PAYMENT_SUCCESS',
            studentId      : INVOICE.studentId,
            amount         : subtotal,
            taxAmount      : tax,
            totalAmount    : total,
            taxRate        : STRIPE_TAX_RATE,
            forClass       : forClassDatesArr.length ? forClassDatesArr[0] : today,
            forClassDates  : forClassDatesArr.length ? forClassDatesArr : [today],
            date           : today,
          }, '*');
        } catch(_){}

        // Auto-close after 3 s
        setTimeout(() => {
          try { window.parent.postMessage({ type:'ARNOMA_CLOSE_PAYMENT' }, '*'); } catch(_){}
        }, 3000);
      }

      /* ── Boot ── */
      async function init() {
        renderSummary();

        // Handle 3DS redirect return — Stripe adds payment_intent_client_secret to URL
        const redirectSecret = new URLSearchParams(window.location.search).get('payment_intent_client_secret');
        if (redirectSecret) {
          setMsg('info', 'Verifying payment…');
          stripe = window.Stripe(STRIPE_PK);
          const { paymentIntent, error } = await stripe.retrievePaymentIntent(redirectSecret);
          if (error) {
            setMsg('error', error.message || 'Could not verify payment.');
            $payBtn.textContent = 'Try Again';
            $payBtn.disabled = false;
            $payBtn.addEventListener('click', () => { window.location.search = ''; }, { once: true });
          } else if (paymentIntent.status === 'succeeded') {
            await showSuccess();
          } else {
            setMsg('error', `Payment status: ${paymentIntent.status}. Please try again.`);
          }
          return;
        }

        setMsg('info', 'Preparing secure payment form…');
        try {
          const cs = await fetchClientSecret();
          clearMsg();
          await mountPaymentElement(cs);
        } catch(e) {
          setMsg('error', e.message || 'Failed to load payment form.');
          $payBtn.textContent = 'Retry';
          $payBtn.disabled    = false;
          $payBtn.addEventListener('click', init, { once:true });
          return;
        }
        $payBtn.addEventListener('click', handlePay);
      }

      init();
    </script>
  </body>
</html>
