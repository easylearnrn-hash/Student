<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ARNOMA – Secure Payment</title>
    <script src="https://js.stripe.com/v3/"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg: #070a14;
        --surface: rgba(255,255,255,0.055);
        --surface-hover: rgba(255,255,255,0.08);
        --border: rgba(255,255,255,0.10);
        --border-accent: rgba(102,126,234,0.35);
        --primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        --primary-solid: #667eea;
        --text: #eef0f8;
        --text-secondary: #a8b3d4;
        --muted: #6b7899;
        --red: #ef4444;
        --green: #22c55e;
        --gold: #f59e0b;
        --blur: 16px;
      }

      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

      html { height: 100%; }

      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg);
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        color: var(--text);
        padding: 24px 16px;
        overflow-x: hidden;
      }

      /* ── Ambient glow orbs ── */
      .orb {
        position: fixed;
        border-radius: 50%;
        pointer-events: none;
        z-index: 0;
        filter: blur(80px);
      }
      .orb-1 {
        width: 520px; height: 520px;
        top: -200px; right: -140px;
        background: radial-gradient(circle, rgba(102,126,234,0.22) 0%, transparent 70%);
      }
      .orb-2 {
        width: 580px; height: 580px;
        bottom: -240px; left: -200px;
        background: radial-gradient(circle, rgba(118,75,162,0.20) 0%, transparent 70%);
      }
      .orb-3 {
        width: 300px; height: 300px;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        background: radial-gradient(circle, rgba(102,126,234,0.06) 0%, transparent 70%);
      }

      /* ── Card ── */
      .card {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 480px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 28px;
        backdrop-filter: blur(var(--blur));
        -webkit-backdrop-filter: blur(var(--blur));
        padding: 36px 32px 32px;
        box-shadow:
          0 32px 80px rgba(0,0,0,0.55),
          0 0 0 1px rgba(255,255,255,0.04) inset,
          0 1px 0 rgba(255,255,255,0.08) inset;
        animation: fadeUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(20px) scale(0.98); }
        to   { opacity: 1; transform: translateY(0)    scale(1); }
      }

      /* ── Header ── */
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 28px;
        padding-bottom: 20px;
        border-bottom: 1px solid var(--border);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .brand-icon {
        width: 44px;
        height: 44px;
        border-radius: 14px;
        background: var(--primary);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        box-shadow: 0 6px 20px rgba(102,126,234,0.35);
      }

      .brand-icon svg {
        width: 22px;
        height: 22px;
        fill: none;
        stroke: rgba(255,255,255,0.95);
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .brand-text { line-height: 1; }
      .brand-name {
        font-size: 16px;
        font-weight: 800;
        letter-spacing: 0.06em;
        color: var(--text);
        text-transform: uppercase;
      }
      .brand-sub {
        font-size: 11px;
        color: var(--muted);
        letter-spacing: 0.03em;
        margin-top: 3px;
        font-weight: 400;
      }

      .secure-badge {
        display: flex;
        align-items: center;
        gap: 5px;
        background: rgba(34,197,94,0.08);
        border: 1px solid rgba(34,197,94,0.2);
        border-radius: 20px;
        padding: 5px 10px;
        font-size: 11px;
        font-weight: 600;
        color: #6ee7b7;
      }

      .secure-badge svg {
        width: 11px; height: 11px;
        fill: #4ade80;
      }

      /* ── Invoice banner ── */
      .invoice-banner {
        background: linear-gradient(135deg, rgba(102,126,234,0.10) 0%, rgba(118,75,162,0.10) 100%);
        border: 1px solid var(--border-accent);
        border-radius: 18px;
        padding: 20px 22px;
        margin-bottom: 26px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        position: relative;
        overflow: hidden;
      }

      .invoice-banner::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(102,126,234,0.5), transparent);
      }

      .invoice-info { min-width: 0; }

      .invoice-label {
        font-size: 10px;
        font-weight: 600;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-bottom: 5px;
      }

      .invoice-student {
        font-size: 15px;
        font-weight: 700;
        color: var(--text);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        letter-spacing: 0.01em;
      }

      .invoice-right { text-align: right; flex-shrink: 0; }

      .invoice-amount {
        font-size: 30px;
        font-weight: 800;
        background: var(--primary);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1;
        letter-spacing: -0.01em;
      }

      .invoice-currency-label {
        font-size: 10px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-top: 4px;
        font-weight: 500;
      }

      /* ── Divider ── */
      .divider {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 20px;
      }
      .divider-line { flex: 1; height: 1px; background: var(--border); }
      .divider-text {
        font-size: 11px;
        font-weight: 600;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        white-space: nowrap;
      }

      /* ── Payment element slot ── */
      #payment-element {
        margin-bottom: 20px;
        min-height: 120px;
      }

      /* ── Status messages ── */
      .status-msg {
        font-size: 13px;
        padding: 12px 16px;
        border-radius: 12px;
        margin-bottom: 18px;
        display: none;
        line-height: 1.55;
        font-weight: 500;
      }
      .status-msg.info {
        display: flex;
        align-items: center;
        gap: 10px;
        background: rgba(102,126,234,0.10);
        border: 1px solid rgba(102,126,234,0.28);
        color: #e0e5ff;
      }
      .status-msg.error {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        background: rgba(239,68,68,0.08);
        border: 1px solid rgba(239,68,68,0.28);
        color: #fecaca;
      }
      .status-msg.success {
        display: block;
        background: rgba(34,197,94,0.08);
        border: 1px solid rgba(34,197,94,0.28);
        color: #bbf7d0;
        text-align: center;
        font-weight: 600;
        font-size: 15px;
        padding: 28px 20px;
      }
      .msg-icon { font-size: 15px; flex-shrink: 0; line-height: 1; margin-top: 1px; }

      /* ── Spinner ── */
      .spinner {
        display: inline-block;
        width: 17px; height: 17px;
        border: 2.5px solid rgba(11,16,34,0.3);
        border-top-color: #0b1022;
        border-radius: 50%;
        animation: spin 0.65s linear infinite;
        vertical-align: middle;
        margin-right: 8px;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      /* ── Pay button ── */
      .pay-btn {
        width: 100%;
        padding: 16px 20px;
        border: none;
        border-radius: 16px;
        background: var(--primary);
        color: #0b1022;
        font-family: inherit;
        font-size: 15px;
        font-weight: 800;
        letter-spacing: 0.04em;
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
        text-transform: uppercase;
        position: relative;
        overflow: hidden;
      }

      .pay-btn::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 50%;
        background: linear-gradient(180deg, rgba(255,255,255,0.12), transparent);
        border-radius: 16px 16px 0 0;
        pointer-events: none;
      }

      .pay-btn:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 10px 30px rgba(102,126,234,0.5), 0 4px 12px rgba(0,0,0,0.3);
      }
      .pay-btn:active:not(:disabled) {
        transform: translateY(0);
        box-shadow: 0 4px 12px rgba(102,126,234,0.3);
      }
      .pay-btn:disabled { opacity: 0.5; cursor: not-allowed; }

      /* ── Footer ── */
      .footer {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 16px;
        margin-top: 20px;
        padding-top: 18px;
        border-top: 1px solid var(--border);
      }

      .footer-item {
        display: flex;
        align-items: center;
        gap: 5px;
        font-size: 11px;
        color: var(--muted);
        font-weight: 500;
        letter-spacing: 0.01em;
      }

      .footer-item svg {
        width: 12px; height: 12px;
        opacity: 0.6;
      }

      .footer-dot {
        width: 3px; height: 3px;
        border-radius: 50%;
        background: var(--muted);
        opacity: 0.4;
      }

      /* ── Success state ── */
      .success-icon {
        width: 64px; height: 64px;
        border-radius: 50%;
        background: rgba(34,197,94,0.12);
        border: 1px solid rgba(34,197,94,0.3);
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 16px;
        animation: popIn 0.4s cubic-bezier(0.16,1,0.3,1);
      }
      .success-icon svg {
        width: 30px; height: 30px;
        stroke: #4ade80;
        stroke-width: 2.5;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
      }
      @keyframes popIn {
        from { transform: scale(0.6); opacity: 0; }
        to   { transform: scale(1);   opacity: 1; }
      }
      .success-title {
        font-size: 18px;
        font-weight: 800;
        color: var(--text);
        margin-bottom: 6px;
      }
      .success-sub {
        font-size: 13px;
        color: var(--text-secondary);
        font-weight: 400;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="card" id="payCard">

      <!-- Header -->
      <div class="header">
        <div class="brand">
          <div class="brand-icon">
            <!-- Credit card icon -->
            <svg viewBox="0 0 24 24">
              <rect x="2" y="5" width="20" height="14" rx="2"/>
              <line x1="2" y1="10" x2="22" y2="10"/>
              <line x1="6" y1="15" x2="10" y2="15"/>
            </svg>
          </div>
          <div class="brand-text">
            <div class="brand-name">ARNOMA</div>
            <div class="brand-sub">Secure Payment Portal</div>
          </div>
        </div>
        <div class="secure-badge">
          <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          SSL Secured
        </div>
      </div>

      <!-- Invoice summary -->
      <div class="invoice-banner" id="invoiceBanner">
        <div class="invoice-info">
          <div class="invoice-label">Paying for</div>
          <div class="invoice-student" id="displayName">Loading…</div>
        </div>
        <div class="invoice-right">
          <div class="invoice-amount" id="displayAmount">—</div>
          <div class="invoice-currency-label" id="displayCurrency">USD</div>
        </div>
      </div>

      <!-- Payment element -->
      <div class="divider">
        <div class="divider-line"></div>
        <div class="divider-text">Payment Details</div>
        <div class="divider-line"></div>
      </div>

      <div id="payment-element"></div>
      <div class="status-msg" id="statusMsg"></div>

      <button class="pay-btn" id="payBtn" disabled>Loading…</button>

      <!-- Footer trust signals -->
      <div class="footer">
        <div class="footer-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          256-bit Encryption
        </div>
        <div class="footer-dot"></div>
        <div class="footer-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
          PCI Compliant
        </div>
        <div class="footer-dot"></div>
        <div class="footer-item">
          Powered by Stripe
        </div>
      </div>

    </div>

    <script>
      /* ── CONFIG ── */
      const STRIPE_PK = 'pk_live_51HKvyeKHAwZsjk64kBQ6PrmVb409AuCXdDmCPQX3z5y3j4sRc9CZDomsG8TXrBDa6xapO2jtWlpOl8pTR92FlNYX00vCScBYzF';
      const SUPABASE_URL = 'https://zlvnxvrzotamhpezqedr.supabase.co';
      const CREATE_PI_ENDPOINT = `${SUPABASE_URL}/functions/v1/create-payment-intent`;

      /* ── Parse URL params (set by student-portal.html) ── */
      const params = new URLSearchParams(window.location.search);
      const INVOICE = {
        studentName  : params.get('student')    || params.get('student_name') || 'Student',
        studentEmail : params.get('email')      || '',
        studentId    : params.get('student_id') || '',
        amountDollars: parseFloat(params.get('amount') || '0'),
        currency     : (params.get('currency')  || 'usd').toLowerCase(),
        invoiceRef   : params.get('invoice')    || params.get('invoice_ref') || '',
      };

      /* ── DOM refs ── */
      const $name   = document.getElementById('displayName');
      const $amount = document.getElementById('displayAmount');
      const $msg    = document.getElementById('statusMsg');
      const $payBtn = document.getElementById('payBtn');
      const $peSlot = document.getElementById('payment-element');

      /* ── Helpers ── */
      function fmt(dollars, currency) {
        return new Intl.NumberFormat('en-US', {
          style:'currency', currency:(currency||'usd').toUpperCase(), minimumFractionDigits:2
        }).format(dollars);
      }
      function setMsg(kind, text) {
        const icons = { info: '⏳', error: '⚠️' };
        $msg.className = `status-msg ${kind}`;
        $msg.innerHTML = kind !== 'success'
          ? `<span class="msg-icon">${icons[kind]||''}</span><span>${text}</span>`
          : text;
      }
      function clearMsg() { $msg.className = 'status-msg'; $msg.innerHTML = ''; }
      function setBtnLoading(yes) {
        $payBtn.disabled = yes;
        $payBtn.innerHTML = yes
          ? `<span class="spinner"></span> Processing…`
          : `Pay ${fmt(INVOICE.amountDollars, INVOICE.currency)}`;
      }

      /* ── Render summary ── */
      function renderSummary() {
        $name.textContent   = INVOICE.studentName;
        $amount.textContent = INVOICE.amountDollars > 0 ? fmt(INVOICE.amountDollars, INVOICE.currency) : '—';
        const currLabel = document.getElementById('displayCurrency');
        if (currLabel) currLabel.textContent = INVOICE.currency.toUpperCase();
      }

      /* ── Step 1: get clientSecret from Edge Function ── */
      async function fetchClientSecret() {
        if (INVOICE.amountDollars <= 0) throw new Error('No balance due. Nothing to charge.');
        const resp = await fetch(CREATE_PI_ENDPOINT, {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({
            amount_cents : Math.round(INVOICE.amountDollars * 100),
            currency     : INVOICE.currency,
            student_id   : INVOICE.studentId,
            student_name : INVOICE.studentName,
            student_email: INVOICE.studentEmail,
            invoice_ref  : INVOICE.invoiceRef,
          }),
        });
        if (!resp.ok) {
          const err = await resp.text().catch(() => resp.status);
          throw new Error(`Server error (${resp.status}): ${String(err).slice(0,180)}`);
        }
        const data = await resp.json();
        if (!data.clientSecret) throw new Error('Server did not return a clientSecret.');
        return data.clientSecret;
      }

      /* ── Step 2: mount Payment Element ── */
      let stripe, elements;
      async function mountPaymentElement(clientSecret) {
        stripe   = window.Stripe(STRIPE_PK);
        elements = stripe.elements({
          clientSecret,
          appearance:{
            theme:'night',
            variables:{
              colorPrimary    :'#667eea',
              colorBackground :'#0d1120',
              colorText       :'#eef0f8',
              colorDanger     :'#ef4444',
              borderRadius    :'10px',
              fontFamily      :"-apple-system,BlinkMacSystemFont,'Inter',sans-serif",
            }
          }
        });
        elements.create('payment', { layout:'tabs' }).mount('#payment-element');
        $payBtn.textContent = `Pay ${fmt(INVOICE.amountDollars, INVOICE.currency)}`;
        $payBtn.disabled    = false;
      }

      /* ── Step 3: confirm payment ── */
      async function handlePay() {
        if (!stripe || !elements) return;
        clearMsg();
        setBtnLoading(true);

        const returnUrl = new URL(window.location.origin + '/student-portal.html');
        returnUrl.searchParams.set('payment',    'success');
        returnUrl.searchParams.set('student_id', INVOICE.studentId);

        const { error, paymentIntent } = await stripe.confirmPayment({
          elements,
          confirmParams:{
            return_url   : returnUrl.toString(),
            receipt_email: INVOICE.studentEmail || undefined,
          },
          redirect:'if_required',
        });

        if (error) {
          setMsg('error', error.message || 'Payment failed. Please try again.');
          setBtnLoading(false);
          return;
        }

        if (paymentIntent && paymentIntent.status === 'succeeded') {
          showSuccess();
          return;
        }

        setMsg('info', 'Redirecting to complete authentication…');
      }

      /* ── Success state ── */
      function showSuccess() {
        $peSlot.innerHTML = '';
        $payBtn.style.display = 'none';
        document.getElementById('invoiceBanner').style.display = 'none';
        document.querySelector('.divider').style.display = 'none';
        $msg.className = 'status-msg success';
        $msg.innerHTML = `
          <div class="success-icon">
            <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <div class="success-title">Payment Successful</div>
          <div class="success-sub">Your payment has been processed.<br>A receipt will be sent to your email by Stripe.</div>
        `;

        // Notify parent window (student-portal.html modal)
        try { window.parent.postMessage({ type:'ARNOMA_PAYMENT_SUCCESS', studentId:INVOICE.studentId }, '*'); } catch(_){}
        // Auto-close after 3 s
        setTimeout(() => {
          try { window.parent.postMessage({ type:'ARNOMA_CLOSE_PAYMENT' }, '*'); } catch(_){}
        }, 3000);
      }

      /* ── Boot ── */
      async function init() {
        renderSummary();
        setMsg('info', 'Preparing secure payment form…');
        try {
          const cs = await fetchClientSecret();
          clearMsg();
          await mountPaymentElement(cs);
        } catch(e) {
          setMsg('error', e.message || 'Failed to load payment form.');
          $payBtn.textContent = 'Retry';
          $payBtn.disabled    = false;
          $payBtn.addEventListener('click', init, { once:true });
          return;
        }
        $payBtn.addEventListener('click', handlePay);
      }

      init();
    </script>
  </body>
</html>
