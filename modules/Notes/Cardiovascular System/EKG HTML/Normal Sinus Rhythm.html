<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NSR Strip</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    canvas {
      width: 100vw;
      height: 110px;
      display: block;
    }
    .pause-btn {
      position: absolute;
      top: 6px;
      right: 8px;
      width: 26px;
      height: 26px;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(0, 0, 0, 0.55);
      color: #b7ffcf;
      font-size: 14px;
      cursor: pointer;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .pause-btn:hover { background: rgba(0, 0, 0, 0.75); }
    .pause-btn:active { transform: scale(0.96); }

    /* Magnifier overlay canvas */
    #mag {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 4;
    }
    .container { max-width: 900px; margin: 0 auto; }
</style>
  <link rel="stylesheet" href="/Notes/css/med-abbr-tooltip.css">
  <script src="/Notes/js/med-abbr-tooltip.js" defer></script>
</head>
<body>
<div class="container">
<button id="pauseBtn" class="pause-btn" aria-label="Pause strip" title="Pause/Play">⏸</button>
<canvas id="c"></canvas>
<canvas id="mag"></canvas>
<script>
// ── 1. Setup ─────────────────────────────────────────────────────
const canvas = document.getElementById('c');

const DPR = window.devicePixelRatio || 1;
const CH  = 110;
const VIEW_W = window.innerWidth;

// 6-second strip shown full screen width
const MM    = 3.78;
const STRIP_SECONDS = 6;
const CW  = VIEW_W;
const SPEED = CW / STRIP_SECONDS;

canvas.width = Math.round(CW * DPR);
canvas.height = Math.round(CH * DPR);
canvas.style.width = CW + 'px';
canvas.style.height = CH + 'px';

const ctx = canvas.getContext('2d', { alpha: false });
ctx.scale(DPR, DPR);

// ── 2. Constants ─────────────────────────────────────────────────
const HR    = 72;
const RR_S  = 60 / HR;
const RR_PX = RR_S * SPEED;
const BASE  = CH * 0.58;
const GAIN  = 0.95;

// ── 3. Monitor grid (static, subtle) ─────────────────────────────
function drawGridStatic() {
  const sm = MM, lg = MM * 5;
  ctx.fillStyle = '#000b00';
  ctx.fillRect(0, 0, CW, CH);

  // Minor grid (1 mm) — subtle
  ctx.strokeStyle = 'rgba(0, 160, 0, 0.12)';
  ctx.lineWidth = 1;
  for (let x = 0; x <= CW; x += sm) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, CH); ctx.stroke();
  }
  for (let y = 0; y <= CH; y += sm) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(CW, y); ctx.stroke();
  }

  // Major grid (5 mm) — a bit stronger
  ctx.strokeStyle = 'rgba(0, 255, 120, 0.22)';
  ctx.lineWidth = 1;
  for (let x = 0; x <= CW; x += lg) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, CH); ctx.stroke();
  }
  for (let y = 0; y <= CH; y += lg) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(CW, y); ctx.stroke();
  }
}

// ── 4. Waveform math ─────────────────────────────────────────────
function gauss(f, mu, sig, amp) {
  return amp * Math.exp(-0.5 * ((f - mu) / sig) ** 2);
}
function tri(f, peak, up, dn, amp) {
  if (f >= peak - up && f < peak)       return amp * (f - (peak - up)) / up;
  if (f >= peak      && f <= peak + dn) return amp * (1 - (f - peak) / dn);
  return 0;
}
function nsrV(f) {
  // Normal sinus rhythm: normal sinus morphology and normal rate.
  let v = 0;

  // baseline wander (very subtle)
  v += 0.05 * Math.sin(2 * Math.PI * f);

  // P wave: present, uniform, one before each QRS
  v += gauss(f, 0.17, 22/1000, 1.6);

  // PR interval normal and constant; QRS normal and narrow (< 0.12 sec)
  v += tri(f, 0.292,  7/1000,  5/1000, -1.2);   // Q
  v += tri(f, 0.304,  8/1000,  8/1000, 11.8);   // R
  v += tri(f, 0.324,  6/1000, 11/1000, -3.2);   // S

  // ST segment: near baseline
  if (f >= 0.345 && f <= 0.44) {
    v += 0.08 * (1 - (f - 0.345) / 0.095);
  }

  // T wave: normal and upright
  v += gauss(f, 0.56, 50/1000, 2.8);

  // tiny U wave (optional, very subtle)
  v += gauss(f, 0.72, 16/1000, 1/10);

  return v;
}

// ── 5. Animated 6-second strip window ───────────────────────────
const TILE_W = Math.round(RR_PX * 10);

const wfTile = new OffscreenCanvas(TILE_W, CH);
(function bakeWaveform() {
  const g = wfTile.getContext('2d');
  g.clearRect(0, 0, TILE_W, CH);

  // ── trace ──
  g.beginPath();
  for (let i = 0; i <= TILE_W * 4; i++) {
    const x = i / 4;
    const f = (x % RR_PX) / RR_PX;
  const y = BASE - nsrV(f) * MM * GAIN;
    i === 0 ? g.moveTo(x, y) : g.lineTo(x, y);
  }
  // Bright phosphor trace
  g.strokeStyle = '#2bff6b';
  g.lineWidth   = 2.4;
  g.lineJoin    = 'round';
  g.lineCap     = 'round';
  g.stroke();
}());

// ── 6. Animation — animated 6-second strip ──────────────────────
let t0 = null;
let paused = false;
let pauseStart = 0;
let rafId = null;
let frozenScrollPx = 0;

const pauseBtn = document.getElementById('pauseBtn');
pauseBtn.addEventListener('click', () => {
  paused = !paused;
  pauseBtn.textContent = paused ? '▶' : '⏸';
  pauseBtn.setAttribute('aria-label', paused ? 'Play strip' : 'Pause strip');

  if (paused) {
    pauseStart = performance.now();
    if (rafId) cancelAnimationFrame(rafId);
    return;
  }

  if (pauseStart) t0 += performance.now() - pauseStart;
  rafId = requestAnimationFrame(frame);
});

function frame(ts) {
  if (paused) return;
  if (!t0) t0 = ts;

  const t = (ts - t0) * 0.001;
  frozenScrollPx = (t * SPEED) % TILE_W;

  drawGridStatic();

  let srcX = frozenScrollPx;
  let dstX = 0;

  while (dstX < CW) {
    const sliceW = Math.min(TILE_W - srcX, CW - dstX);
    ctx.drawImage(wfTile, srcX, 0, sliceW, CH, dstX, 0, sliceW, CH);
    dstX += sliceW;
    srcX = 0;
  }

  rafId = requestAnimationFrame(frame);
}
rafId = requestAnimationFrame(frame);

// ── 7. Magnifier (active only when paused) ──────────────────────
const magCanvas = document.getElementById('mag');
const magCtx    = magCanvas.getContext('2d');

const MAG_R     = 80;   // lens radius in CSS px
const MAG_SCALE = 3;    // zoom factor

function resizeMag() {
  magCanvas.width  = Math.round(CW * DPR);
  magCanvas.height = Math.round(CH * DPR);
  magCanvas.style.width  = CW + 'px';
  magCanvas.style.height = CH + 'px';
}
resizeMag();
window.addEventListener('resize', resizeMag);

let magX = -1, magY = -1, magVisible = false;

function drawMagnifier() {
  magCtx.clearRect(0, 0, magCanvas.width, magCanvas.height);
  if (!magVisible || !paused || magX < 0) return;

  // All geometry in physical canvas pixels (multiplied by DPR)
  const cx = magX * DPR;
  const cy = magY * DPR;
  const r  = MAG_R * DPR;

  // ── Source rect on the main canvas: the region under the lens at 1:1 ──
  // srcW/srcH is what we'll zoom — a window of the main canvas centred on (cx,cy)
  const srcW = (r * 2) / MAG_SCALE;   // physical px
  const srcH = (r * 2) / MAG_SCALE;
  let srcX = cx - srcW / 2;
  let srcY = cy - srcH / 2;

  // Clamp source rect so we never read outside the canvas
  srcX = Math.max(0, Math.min(canvas.width  - srcW, srcX));
  srcY = Math.max(0, Math.min(canvas.height - srcH, srcY));

  // ── Clip to circle ──
  magCtx.save();
  magCtx.beginPath();
  magCtx.arc(cx, cy, r, 0, Math.PI * 2);
  magCtx.clip();

  // ── Draw zoomed section of the main canvas (pixel-perfect, uses imageSmoothingQuality) ──
  magCtx.imageSmoothingEnabled = true;
  magCtx.imageSmoothingQuality = 'high';
  magCtx.drawImage(
    canvas,
    srcX, srcY, srcW, srcH,   // source rect (physical px on main canvas)
    cx - r, cy - r, r * 2, r * 2  // dest rect (fills the lens)
  );

  // ── Draw zoomed grid lines on top ──
  // Grid spacing at 3x zoom: 3.78mm * MAG_SCALE * DPR physical px
  const sm = 3.78 * MAG_SCALE * DPR;
  const lg = sm * 5;

  // The grid origin in the zoomed view:
  // A point at physical srcX,srcY maps to cx-r,cy-r in the dest.
  // Scale factor = r*2 / srcW = MAG_SCALE
  // So a source grid line at x=n*3.78 (physical) maps to dest = (cx-r) + (n*3.78 - srcX)*MAG_SCALE
  // Equivalently: offset = (cx - r) - srcX * MAG_SCALE
  const gox = (cx - r) - srcX * MAG_SCALE;
  const goy = (cy - r) - srcY * MAG_SCALE;

  magCtx.strokeStyle = 'rgba(0, 160, 0, 0.20)';
  magCtx.lineWidth = DPR;
  const x0 = Math.floor((cx - r - gox) / sm) * sm + gox;
  for (let x = x0; x <= cx + r; x += sm) {
    magCtx.beginPath(); magCtx.moveTo(x, cy - r); magCtx.lineTo(x, cy + r); magCtx.stroke();
  }
  const y0 = Math.floor((cy - r - goy) / sm) * sm + goy;
  for (let y = y0; y <= cy + r; y += sm) {
    magCtx.beginPath(); magCtx.moveTo(cx - r, y); magCtx.lineTo(cx + r, y); magCtx.stroke();
  }
  magCtx.strokeStyle = 'rgba(0, 255, 120, 0.35)';
  const lx0 = Math.floor((cx - r - gox) / lg) * lg + gox;
  for (let x = lx0; x <= cx + r; x += lg) {
    magCtx.beginPath(); magCtx.moveTo(x, cy - r); magCtx.lineTo(x, cy + r); magCtx.stroke();
  }
  const ly0 = Math.floor((cy - r - goy) / lg) * lg + goy;
  for (let y = ly0; y <= cy + r; y += lg) {
    magCtx.beginPath(); magCtx.moveTo(cx - r, y); magCtx.lineTo(cx + r, y); magCtx.stroke();
  }

  magCtx.restore();

  // ── Lens border ──
  magCtx.beginPath();
  magCtx.arc(cx, cy, r, 0, Math.PI * 2);
  magCtx.strokeStyle = 'rgba(43, 255, 107, 0.65)';
  magCtx.lineWidth = 2 * DPR;
  magCtx.stroke();

  // ── Crosshair ──
  const gap = 8 * DPR;
  magCtx.strokeStyle = 'rgba(43, 255, 107, 0.30)';
  magCtx.lineWidth = DPR;
  magCtx.beginPath();
  magCtx.moveTo(cx - r + gap, cy); magCtx.lineTo(cx + r - gap, cy); magCtx.stroke();
  magCtx.beginPath();
  magCtx.moveTo(cx, cy - r + gap); magCtx.lineTo(cx, cy + r - gap); magCtx.stroke();
}

// ── Input handlers ───────────────────────────────────────────────
function updateMagPos(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  magX = clientX - rect.left;
  magY = clientY - rect.top;
}

canvas.addEventListener('mousemove', e => {
  if (!paused) { magVisible = false; magCtx.clearRect(0, 0, magCanvas.width, magCanvas.height); return; }
  updateMagPos(e.clientX, e.clientY);
  magVisible = true;
  drawMagnifier();
});
canvas.addEventListener('mouseleave', () => {
  magVisible = false;
  magCtx.clearRect(0, 0, magCanvas.width, magCanvas.height);
});
canvas.addEventListener('touchmove', e => {
  if (!paused) return;
  e.preventDefault();
  updateMagPos(e.touches[0].clientX, e.touches[0].clientY);
  magVisible = true;
  drawMagnifier();
}, { passive: false });
canvas.addEventListener('touchend', () => {
  magVisible = false;
  magCtx.clearRect(0, 0, magCanvas.width, magCanvas.height);
});

// Hide magnifier when unpausing (capture phase so it fires before paused toggles)
pauseBtn.addEventListener('click', () => {
  if (!paused) {
    magVisible = false;
    magCtx.clearRect(0, 0, magCanvas.width, magCanvas.height);
  }
}, true);


// ── Viewport pause/play from parent page ────────────────────────
window.addEventListener('message', e => {
  if (e.data === 'ekgPause' && !paused) {
    paused = true;
    pauseBtn.textContent = '▶';
    pauseBtn.setAttribute('aria-label', 'Play strip');
    pauseStart = performance.now();
    if (rafId) cancelAnimationFrame(rafId);
  } else if (e.data === 'ekgPlay' && paused) {
    paused = false;
    pauseBtn.textContent = '⏸';
    pauseBtn.setAttribute('aria-label', 'Pause strip');
    if (pauseStart) t0 += performance.now() - pauseStart;
    rafId = requestAnimationFrame(frame);
  }
});

</script>
</div>
<script src="../../js/acnhs-nav-inject.js" defer></script>
</body>
</html>
