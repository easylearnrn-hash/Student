<!DOCTYPE html>
<html lang="en">
<head>
    <script src="shared-auth.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📅 Group Schedules - Quick View</title>
  
  <!-- Supabase Client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.1"></script>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600;1,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-base: #0c0f1a;
      --gold: #c4a45f;
      --gold-light: #d4b87a;
      --gold-pale: #e8d5a3;
      --gold-border: rgba(196, 164, 95, 0.22);
      --gold-border-hover: rgba(196, 164, 95, 0.55);
      --text-primary: rgba(235, 225, 200, 0.95);
      --text-muted: rgba(196, 164, 95, 0.45);
      --font-serif: 'Playfair Display', Georgia, serif;
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --modal-shadow: 0 32px 80px rgba(0, 0, 0, 0.7), 0 1px 0 rgba(196, 164, 95, 0.18) inset;
    }

    body {
      font-family: var(--font-sans);
      background: transparent;
      min-height: 100vh;
      color: var(--text-primary);
      overflow-x: hidden;
      padding: 0;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body::before {
      display: none;
    }

    .container {
      width: 95%;
      max-width: 1100px;
      max-height: 95vh;
      display: flex;
      flex-direction: column;
      background: linear-gradient(160deg, rgba(14, 18, 30, 0.99) 0%, rgba(10, 13, 24, 0.99) 100%);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--gold-border);
      border-radius: 20px;
      box-shadow: var(--modal-shadow);
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      background: rgba(196, 164, 95, 0.04);
      border-bottom: 1px solid var(--gold-border);
      padding: 18px 24px;
      flex-shrink: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 {
      margin: 0;
      font-family: var(--font-serif);
      font-size: 21px;
      font-weight: 700;
      font-style: italic;
      color: var(--gold-light);
      letter-spacing: 0.3px;
    }

    /* ── Download Button ── */
    .download-btn {
      padding: 0;
      background: rgba(196, 164, 95, 0.06);
      border: 1px solid var(--gold-border);
      border-radius: 10px;
      color: var(--gold);
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      flex-shrink: 0;
    }

    .download-btn svg {
      width: 18px;
      height: 18px;
      stroke: var(--gold);
    }

    .download-btn:hover {
      background: rgba(196, 164, 95, 0.14);
      border-color: var(--gold-border-hover);
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(196, 164, 95, 0.15);
    }

    .download-btn:active {
      transform: translateY(0);
    }

    /* ── Tabs ── */
    .tabs {
      background: rgba(196, 164, 95, 0.025);
      border-bottom: 1px solid var(--gold-border);
      padding: 12px 24px;
      display: flex;
      gap: 8px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .tab-btn {
      padding: 8px 18px;
      background: rgba(196, 164, 95, 0.06);
      border: 1px solid var(--gold-border);
      border-radius: 8px;
      color: var(--text-muted);
      font-family: var(--font-sans);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: 0.2px;
    }

    .tab-btn:hover {
      background: rgba(196, 164, 95, 0.1);
      border-color: var(--gold-border-hover);
      color: var(--gold);
      transform: translateY(-1px);
    }

    .tab-btn.active {
      background: rgba(196, 164, 95, 0.16);
      border-color: var(--gold-border-hover);
      color: var(--gold-pale);
      font-weight: 700;
      box-shadow: 0 2px 12px rgba(196, 164, 95, 0.12);
    }

    /* ── Content ── */
    .content {
      padding: 22px 24px;
      overflow-y: auto;
      flex: 1;
      scrollbar-width: thin;
      scrollbar-color: rgba(196, 164, 95, 0.25) transparent;
    }

    .content::-webkit-scrollbar { width: 5px; }
    .content::-webkit-scrollbar-track { background: transparent; }
    .content::-webkit-scrollbar-thumb {
      background: rgba(196, 164, 95, 0.25);
      border-radius: 3px;
    }

    /* ── By-Weekday layout ── */
    .schedule-grid {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .day-card {
      background: rgba(196, 164, 95, 0.03);
      border: 1px solid var(--gold-border);
      border-radius: 12px;
      padding: 16px 18px;
      transition: all 0.2s ease;
    }

    .day-card.today {
      border-color: rgba(196, 164, 95, 0.6);
      background: rgba(196, 164, 95, 0.06);
      box-shadow: 0 0 22px rgba(196, 164, 95, 0.1), inset 0 1px 0 rgba(196, 164, 95, 0.08);
    }

    .day-title {
      font-family: var(--font-serif);
      font-size: 17px;
      font-weight: 700;
      font-style: italic;
      color: var(--gold-light);
      margin-bottom: 10px;
      border-bottom: 1px solid var(--gold-border);
      padding-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
      letter-spacing: 0.2px;
    }

    .today-badge {
      font-family: var(--font-sans);
      font-style: normal;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--gold);
      background: rgba(196, 164, 95, 0.14);
      border: 1px solid rgba(196, 164, 95, 0.35);
      padding: 3px 8px;
      border-radius: 5px;
    }

    .sessions-container {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .session-badge {
      padding: 10px 14px;
      background: rgba(196, 164, 95, 0.07);
      border: 1px solid var(--gold-border);
      border-radius: 9px;
      font-family: var(--font-sans);
      font-size: 13px;
      color: var(--text-primary);
      display: inline-flex;
      flex-direction: column;
      gap: 3px;
      min-width: 200px;
      transition: border-color 0.15s, background 0.15s;
    }

    .session-badge:hover {
      background: rgba(196, 164, 95, 0.12);
      border-color: var(--gold-border-hover);
    }

    .session-badge strong {
      color: var(--gold-pale);
    }

    .session-time {
      font-size: 11px;
      color: var(--text-muted);
    }

    .no-sessions {
      font-family: var(--font-sans);
      font-size: 12px;
      font-style: italic;
      color: var(--text-muted);
    }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 200px;
      font-family: var(--font-sans);
      font-size: 15px;
      color: var(--text-muted);
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .spinner {
      display: inline-block;
      margin-right: 10px;
      animation: spin 1s linear infinite;
    }

    /* ── By-Group grid ── */
    .group-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
    }

    .group-card {
      background: rgba(196, 164, 95, 0.04);
      border: 1px solid var(--gold-border);
      border-radius: 14px;
      padding: 20px 20px 18px;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
    }

    .group-card:hover {
      border-color: var(--gold-border-hover);
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.3), 0 0 16px rgba(196, 164, 95, 0.08);
    }

    .group-name {
      font-family: var(--font-serif);
      font-size: 20px;
      font-weight: 700;
      font-style: italic;
      color: var(--gold-light);
      margin-bottom: 4px;
      letter-spacing: 0.2px;
    }

    .group-label {
      font-family: var(--font-sans);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .group-schedule {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .schedule-chip {
      display: inline-block;
      padding: 6px 13px;
      background: rgba(196, 164, 95, 0.09);
      border: 1px solid var(--gold-border);
      border-radius: 7px;
      font-family: var(--font-sans);
      font-size: 12px;
      font-weight: 600;
      color: var(--gold-pale);
      white-space: nowrap;
      letter-spacing: 0.1px;
      transition: border-color 0.15s, background 0.15s;
    }

    .schedule-chip:hover {
      background: rgba(196, 164, 95, 0.15);
      border-color: var(--gold-border-hover);
    }
  </style>
</head>
<body onclick="handleBackgroundClick(event)">
  <div class="container" onclick="event.stopPropagation()">
    <!-- Header -->
    <div class="header">
      <h1>Group Schedules</h1>
      <button class="download-btn" onclick="downloadCurrentTab()" title="Download current tab">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="7 10 12 15 17 10"></polyline>
          <line x1="12" y1="15" x2="12" y2="3"></line>
        </svg>
      </button>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" id="tabByGroup" onclick="switchTab('byGroup')">By Group</button>
      <button class="tab-btn" id="tabByWeekday" onclick="switchTab('byWeekday')">By Weekday (LA)</button>
      <button class="tab-btn" id="tabByWeekdayYerevan" onclick="switchTab('byWeekdayYerevan')">By Weekday (Yerevan)</button>
    </div>

    <!-- Content -->
    <div class="content" id="content">
      <div class="loading">
        <span class="spinner">⏳</span>
        Loading schedules...
      </div>
    </div>
  </div>

  <script>
    // Supabase Configuration
    const SUPABASE_URL = 'https://zlvnxvrzotamhpezqedr.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpsdm54dnJ6b3RhbWhwZXpxZWRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjI4MTEzMTcsImV4cCI6MjA3ODM4NzMxN30.-IoSqKhDrA9NuG4j3GufIbfmodWqCoppEklE1nTmw38';
    
    let supabaseClient = null;
    let currentTab = 'byGroup';
    let groupsData = [];

    function closeQuickViewModal() {
      let handled = false;
      try {
        if (window.parent && window.parent.closeModulePopup) {
          window.parent.closeModulePopup();
          handled = true;
        }
      } catch (error) {
        console.warn('⚠️ Unable to access parent closeModulePopup, falling back to postMessage', error);
      }

      if (!handled) {
        try {
          window.parent?.postMessage({ type: 'close-module-popup' }, '*');
        } catch (postMessageError) {
          console.warn('⚠️ postMessage fallback failed, closing window directly', postMessageError);
        }

        // Final fallback
        window.close();
      }
    }

    // Handle click outside container to close
    function handleBackgroundClick(event) {
      if (event.target === document.body || event.target === event.currentTarget) {
        console.log('🖱️ Background clicked - closing modal');
        closeQuickViewModal();
      }
    }

    // Download current tab as PNG image
    async function downloadCurrentTab() {
      const today = new Date().toLocaleDateString('en-US', { timeZone: 'America/Los_Angeles' }).replace(/\//g, '-');
      let filename = '';
      
      if (currentTab === 'byGroup') {
        filename = `Group_Schedules_${today}.png`;
      } else if (currentTab === 'byWeekday') {
        filename = `Weekly_Schedule_LA_${today}.png`;
      } else if (currentTab === 'byWeekdayYerevan') {
        filename = `Weekly_Schedule_Yerevan_${today}.png`;
      }
      
      try {
        // Load html2canvas library if not already loaded
        if (!window.html2canvas) {
          const script = document.createElement('script');
          script.src = 'https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js';
          document.head.appendChild(script);
          
          await new Promise((resolve, reject) => {
            script.onload = resolve;
            script.onerror = reject;
          });
        }
        
        // Get the content div and save its scroll position
        const contentDiv = document.getElementById('content');
        const originalScrollTop = contentDiv.scrollTop;
        
        // Temporarily remove scroll and expand to full height
        const originalOverflow = contentDiv.style.overflow;
        const originalHeight = contentDiv.style.height;
        const originalMaxHeight = contentDiv.style.maxHeight;
        
        contentDiv.style.overflow = 'visible';
        contentDiv.style.height = 'auto';
        contentDiv.style.maxHeight = 'none';
        contentDiv.scrollTop = 0;
        
        // Find and hide "Today" indicators
        const todayCards = contentDiv.querySelectorAll('.day-card.today');
        const todayTitles = [];
        todayCards.forEach(card => {
          card.classList.remove('today');
          const title = card.querySelector('.day-title');
          if (title) {
            todayTitles.push({
              element: title,
              originalHTML: title.innerHTML
            });
            // Remove star emoji and "(Today)" text
            title.innerHTML = title.innerHTML
              .replace(/⭐\s*/g, '')
              .replace(/\s*\(Today\)/g, '');
          }
        });
        
        // Capture the full content
        const canvas = await html2canvas(contentDiv, {
          backgroundColor: '#0c0f1a',
          scale: 2, // Higher quality
          logging: false,
          windowWidth: contentDiv.scrollWidth,
          windowHeight: contentDiv.scrollHeight
        });
        
        // Restore "Today" indicators
        todayCards.forEach(card => card.classList.add('today'));
        todayTitles.forEach(item => {
          item.element.innerHTML = item.originalHTML;
        });
        
        // Restore original styles
        contentDiv.style.overflow = originalOverflow;
        contentDiv.style.height = originalHeight;
        contentDiv.style.maxHeight = originalMaxHeight;
        contentDiv.scrollTop = originalScrollTop;
        
        // Convert to blob and download
        canvas.toBlob((blob) => {
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = filename;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
          
          console.log(`📥 Downloaded PNG: ${filename}`);
        }, 'image/png');
        
      } catch (error) {
        console.error('❌ Error generating PNG:', error);
        alert('Failed to generate image. Please try again.');
      }
    }

    // Initialize
    if (window.supabase && window.supabase.createClient) {
      supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      console.log('✅ Supabase client initialized');
      loadData();
    } else {
      console.error('❌ Supabase library not loaded');
      document.getElementById('content').innerHTML = '<div class="loading">❌ Failed to load Supabase library</div>';
    }

    async function loadData() {
      try {
        const { data, error } = await supabaseClient
          .from('groups')
          .select('*')
          .eq('active', true)
          .order('group_name');

        if (error) {
          console.error('❌ Supabase error:', error);
          throw error;
        }

        groupsData = data || [];
        console.log('✅ Loaded groups:', groupsData.length);
        console.log('📊 Full groups data:', JSON.stringify(groupsData, null, 2));
        
        // Debug each group's schedule
        groupsData.forEach((group, index) => {
          console.log(`Group ${index + 1}: ${group.group_name}`);
          console.log(`   - ID: ${group.id}`);
          console.log(`   - Schedule field: "${group.schedule}"`);
          console.log(`   - Schedule type: ${typeof group.schedule}`);
          console.log(`   - All fields:`, Object.keys(group));
        });
        
        renderView();
      } catch (err) {
        console.error('❌ Error loading groups:', err);
        document.getElementById('content').innerHTML = `<div class="loading">❌ Error loading schedules<br><small>${err.message || 'Unknown error'}</small></div>`;
      }
    }

    function switchTab(tab) {
      currentTab = tab;
      
      // Update tab buttons
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
      
      renderView();
    }

    function renderView() {
      const content = document.getElementById('content');
      
      if (currentTab === 'byGroup') {
        content.innerHTML = renderByGroup();
      } else if (currentTab === 'byWeekday') {
        content.innerHTML = renderByWeekday('LA');
      } else if (currentTab === 'byWeekdayYerevan') {
        content.innerHTML = renderByWeekday('Yerevan');
      }
    }

    function renderByGroup() {
      // Filter to only show groups with schedules
      const groupsWithSchedules = groupsData.filter(group => {
        const schedule = group.schedule || '';
        return schedule.trim() !== '';
      });

      if (groupsWithSchedules.length === 0) {
        return '<div class="loading">No groups with schedules found</div>';
      }

      console.log('📚 Rendering by group, groups with schedules:', groupsWithSchedules.length);

      const html = groupsWithSchedules.map(group => {
        const scheduleItems = parseSchedule(group.schedule || '');
        
        console.log(`   Group ${group.group_name}:`, {
          raw_schedule: group.schedule,
          parsed_items: scheduleItems
        });
        
        // Convert abbreviated days to full names
        const fullScheduleItems = scheduleItems.map(item => {
          return item
            .replace(/^Mon\s+/, 'Monday ')
            .replace(/^Tue\s+/, 'Tuesday ')
            .replace(/^Wed\s+/, 'Wednesday ')
            .replace(/^Thu\s+/, 'Thursday ')
            .replace(/^Fri\s+/, 'Friday ')
            .replace(/^Sat\s+/, 'Saturday ')
            .replace(/^Sun\s+/, 'Sunday ');
        });
        
        return `
          <div class="group-card">
            <div class="group-name">Group ${group.group_name}</div>
            <div class="group-label">Schedule</div>
            <div class="group-schedule">
              ${fullScheduleItems.length > 0
                ? fullScheduleItems.map(item => `<span class="schedule-chip">${item}</span>`).join('')
                : '<div class="no-sessions">No schedule set</div>'}
            </div>
          </div>
        `;
      }).join('');

      return `<div class="group-grid">${html}</div>`;
    }

    function renderByWeekday(timezone) {
      const weekdays = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
      
      // Get today based on the timezone being viewed
      const today = timezone === 'Yerevan' 
        ? new Date().toLocaleDateString('en-US', { weekday: 'long', timeZone: 'Asia/Yerevan' })
        : new Date().toLocaleDateString('en-US', { weekday: 'long', timeZone: 'America/Los_Angeles' });
      
      console.log(`🔍 Rendering by weekday (${timezone}), Today is: ${today}`);
      
      const scheduleByDay = {};
      weekdays.forEach(day => scheduleByDay[day] = []);

      console.log(`🔍 Rendering by weekday (${timezone})`);

      // Map abbreviated day names to full names
      const dayMap = {
        'Mon': 'Monday',
        'Monday': 'Monday',
        'Tue': 'Tuesday',
        'Tuesday': 'Tuesday',
        'Wed': 'Wednesday',
        'Wednesday': 'Wednesday',
        'Thu': 'Thursday',
        'Thursday': 'Thursday',
        'Fri': 'Friday',
        'Friday': 'Friday',
        'Sat': 'Saturday',
        'Saturday': 'Saturday',
        'Sun': 'Sunday',
        'Sunday': 'Sunday'
      };

      // Parse all group schedules - format: "Mon 8:00 PM, Fri 8:00 AM" or "Monday 8:00 PM"
      groupsData.forEach(group => {
        const scheduleStr = group.schedule || '';
        if (!scheduleStr) {
          console.log(`⚠️ Group ${group.group_name} has no schedule`);
          return;
        }
        
        console.log(`📅 Processing Group ${group.group_name}: "${scheduleStr}"`);
        
        // Split by comma and process each entry
        const entries = scheduleStr.split(',').map(s => s.trim()).filter(s => s);
        console.log(`   Entries:`, entries);
        
        entries.forEach(entry => {
          // Match pattern: "Mon 8:00 PM" or "Monday 8:00 PM" 
          // Supports abbreviated (Mon, Tue, Wed, etc.) and full names
          const match = entry.match(/^(Mon|Monday|Tue|Tuesday|Wed|Wednesday|Thu|Thursday|Fri|Friday|Sat|Saturday|Sun|Sunday)\s+(.+)$/i);
          if (match) {
            const dayAbbr = match[1];
            const time = match[2];
            
            console.log(`   ✓ Matched: ${dayAbbr} at ${time}`);
            
            // Convert abbreviated day to full name
            let fullDayName = dayMap[dayAbbr.charAt(0).toUpperCase() + dayAbbr.slice(1).toLowerCase()];
            
            // For Yerevan view, check if time conversion crosses midnight
            if (timezone === 'Yerevan') {
              const conversion = convertToYerevanWithDay(time);
              if (conversion.dayShift !== 0) {
                // Get the next day
                const currentDayIndex = weekdays.indexOf(fullDayName);
                const newDayIndex = (currentDayIndex + conversion.dayShift + 7) % 7;
                fullDayName = weekdays[newDayIndex];
                console.log(`   ⏰ Time crosses midnight! ${dayAbbr} ${time} → ${fullDayName} ${conversion.time}`);
              }
            }
            
            if (fullDayName && scheduleByDay[fullDayName]) {
              scheduleByDay[fullDayName].push({ group: group.group_name, time: time });
              console.log(`   ✓ Added to ${fullDayName}`);
            } else {
              console.log(`   ✗ No matching day found for "${dayAbbr}" (mapped to: ${fullDayName})`);
            }
          } else {
            console.log(`   ✗ No match for entry: "${entry}"`);
          }
        });
      });

      console.log('📊 Final schedule by day:', scheduleByDay);

      const html = weekdays.map(day => {
        let sessions = scheduleByDay[day];
        const isToday = day === today;

        // Sort sessions chronologically (earliest first) for both views
        if (sessions.length > 0) {
          sessions = sessions.slice().sort((a, b) => {
            const rawA = timezone === 'Yerevan' ? convertToYerevan(a.time) : a.time;
            const rawB = timezone === 'Yerevan' ? convertToYerevan(b.time) : b.time;
            return timeToMinutes(rawA) - timeToMinutes(rawB);
          });
        }

        return `
          <div class="day-card ${isToday ? 'today' : ''}">
            <div class="day-title">
              ${day}${isToday ? ' <span class="today-badge">Today</span>' : ''}
            </div>
            <div class="sessions-container">
              ${sessions.length > 0 
                ? sessions.map(s => renderSessionBadge(s, timezone)).join('') 
                : '<span class="no-sessions">No sessions scheduled</span>'}
            </div>
          </div>
        `;
      }).join('');

      return `<div class="schedule-grid">${html}</div>`;
    }

    function renderSessionBadge(session, timezone) {
      const convertedTime = timezone === 'Yerevan' ? convertToYerevan(session.time) : session.time;
      const otherTime = timezone === 'Yerevan' ? session.time : convertToYerevan(session.time);
      
      return `
        <span class="session-badge">
          <span><strong>Group ${session.group}</strong> — ${convertedTime} (${timezone})</span>
          <span class="session-time">(${otherTime} ${timezone === 'Yerevan' ? 'Los Angeles' : 'Yerevan'} Time)</span>
        </span>
      `;
    }

    function parseSchedule(scheduleStr) {
      if (!scheduleStr) return [];
      return scheduleStr.split(',').map(s => s.trim()).filter(s => s);
    }

    function timeToMinutes(timeStr) {
      const match = timeStr.match(/(\d+):(\d+)\s*(AM|PM)/i);
      if (!match) return 0;
      let [, h, m, period] = match;
      h = parseInt(h); m = parseInt(m);
      if (period.toUpperCase() === 'PM' && h !== 12) h += 12;
      if (period.toUpperCase() === 'AM' && h === 12) h = 0;
      return h * 60 + m;
    }

    function convertToYerevanWithDay(laTime) {
      // Returns { time: "12:02 AM", dayShift: 1 } where dayShift is 0 (same day) or 1 (next day)
      const match = laTime.match(/(\d+):(\d+)\s*(AM|PM)/i);
      if (!match) {
        return { time: laTime, dayShift: 0 };
      }
      
      let [, hours, minutes, period] = match;
      hours = parseInt(hours);
      
      // Convert to 24-hour
      if (period.toUpperCase() === 'PM' && hours !== 12) hours += 12;
      if (period.toUpperCase() === 'AM' && hours === 12) hours = 0;
      
      // Determine offset
      const now = new Date();
      const month = now.getMonth();
      const isPST = month >= 10 || month <= 1;
      const offset = isPST ? 12 : 11;
      
      // Add offset
      let yerevanHours = hours + offset;
      let dayShift = 0;
      
      // Handle day overflow
      if (yerevanHours >= 24) {
        yerevanHours -= 24;
        dayShift = 1; // Next day
      }
      
      // Convert back to 12-hour
      const newPeriod = yerevanHours >= 12 ? 'PM' : 'AM';
      const displayHours = yerevanHours === 0 ? 12 : yerevanHours > 12 ? yerevanHours - 12 : yerevanHours;
      
      return {
        time: `${displayHours}:${minutes} ${newPeriod}`,
        dayShift: dayShift
      };
    }

    function convertToYerevan(laTime) {
      // LA to Yerevan timezone conversion
      // Winter (PST): LA is UTC-8, Yerevan is UTC+4 = +12 hours
      // Summer (PDT): LA is UTC-7, Yerevan is UTC+4 = +11 hours
      // December is winter, so using +12 hours
      
      const match = laTime.match(/(\d+):(\d+)\s*(AM|PM)/i);
      if (!match) {
        console.warn('⚠️ Could not parse time:', laTime);
        return laTime;
      }
      
      let [, hours, minutes, period] = match;
      hours = parseInt(hours);
      
      console.log(`🕐 Converting LA time: ${hours}:${minutes} ${period}`);
      
      // Convert to 24-hour
      if (period.toUpperCase() === 'PM' && hours !== 12) hours += 12;
      if (period.toUpperCase() === 'AM' && hours === 12) hours = 0;
      
      console.log(`   24-hour LA: ${hours}:${minutes}`);
      
      // Determine offset based on current date
      const now = new Date();
      const month = now.getMonth(); // 0-11 (0=Jan, 11=Dec)
      
      // PST months (Nov-Feb roughly): +12 hours
      // PDT months (Mar-Oct roughly): +11 hours
      // Simplified: Nov(10), Dec(11), Jan(0), Feb(1) = +12, else +11
      const isPST = month >= 10 || month <= 1;
      const offset = isPST ? 12 : 11;
      
      console.log(`   Current month: ${month}, using ${isPST ? 'PST' : 'PDT'} offset: +${offset}hr`);
      
      // Add offset for Yerevan
      let yerevanHours = (hours + offset) % 24;
      
      console.log(`   24-hour Yerevan (+${offset}hr): ${yerevanHours}:${minutes}`);
      
      // Convert back to 12-hour
      const newPeriod = yerevanHours >= 12 ? 'PM' : 'AM';
      const displayHours = yerevanHours === 0 ? 12 : yerevanHours > 12 ? yerevanHours - 12 : yerevanHours;
      
      const result = `${displayHours}:${minutes} ${newPeriod}`;
      console.log(`   ✓ Yerevan time: ${result}`);
      
      return result;
    }
  </script>
